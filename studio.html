<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>STARMAKER | Studio Games</title>
    <script src="data.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CUSTOM OVERLAY (Fixes the Pink Gallery Border Bug) --- */
        .studio-lightbox {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(10px); 
            z-index: 9999;
            justify-content: center; 
            align-items: center; 
            cursor: zoom-out;
        }

        /* --- STEAM-STYLE MODAL CSS --- */
        .store-modal {
            background: rgba(22, 32, 45, 0.98); /* Steam's dark blue-gray background */
            border: 1px solid var(--box-border);
            border-radius: 8px;
            width: 95%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px 30px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
            cursor: default; /* Overrides the zoom-out cursor for the actual window */
        }

        .store-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 10px;
        }

        .store-title-area h2 {
            margin: 0;
            color: #ffffff;
            font-size: 2.2rem;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .store-body {
            display: grid;
            grid-template-columns: 60% 36%;
            gap: 4%;
        }

        /* --- LEFT COLUMN: MEDIA GALLERY --- */
        .store-gallery {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .main-screenshot {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .thumbnail-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .thumbnail-strip::-webkit-scrollbar { height: 8px; }
        .thumbnail-strip::-webkit-scrollbar-thumb { background: #3b4c5a; border-radius: 4px; }
        .thumbnail-strip::-webkit-scrollbar-track { background: #17212e; }

        .thumb-img {
            height: 75px;
            aspect-ratio: 16/9;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.5;
            transition: all 0.2s ease;
            flex: 0 0 auto; 
        }

        .thumb-img:hover { opacity: 1; }
        .thumb-img.active {
            border-color: #fff; 
            opacity: 1;
        }

        /* --- RIGHT COLUMN: INFO & TAGS --- */
        .store-details {
            display: flex;
            flex-direction: column;
        }

        .store-capsule {
            width: 100%;
            border-radius: 2px;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .store-details p {
            color: #c6d4df; 
            line-height: 1.5;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .tags-header {
            color: #556772;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 25px;
        }

        .tag {
            background: #223a4c;
            color: #67c1f5;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.8rem;
            user-select: none;
            cursor: default;
            transition: background 0.2s;
        }
        .tag:hover { background: #335670; }

        /* --- CALL TO ACTION --- */
        .store-cta-btn {
            background: linear-gradient(to right, #47bfff, #1a44c2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s ease;
            display: block;
            margin-top: auto; 
        }

        .store-cta-btn:hover {
            filter: brightness(1.2);
        }

        .close-modal-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 4px;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal-btn:hover { background: #ff4466; }

        @media (max-width: 900px) {
            .store-body { grid-template-columns: 1fr; }
            .store-cta-btn { margin-top: 20px; }
            .close-modal-btn { top: 15px; right: 15px; }
        }
    </style>
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    
    <header>
        <div onclick="goHome()" style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink:0; cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;">
            STARMAKER DATABASE
        </div>

        <button class="hamburger" onclick="toggleMenu()">☰</button>

        <nav id="main-nav">
            <div class="nav-links">
                <a href="home.html" class="nav-btn">Home</a>
                <a href="characters.html" class="nav-btn">Characters</a>
                <a href="gallery.html" class="nav-btn">Gallery</a>
                <a href="minigames.html" class="nav-btn">Minigames</a>
                <a href="studio.html" class="nav-btn active">More Games</a>
            </div>

            <div class="mobile-divider"></div>

            <div class="nav-controls">
                <div class="settings-container">
                    <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1rem; padding: 8px 15px;">TRACKS 🎵</button>
                    <button class="nav-btn" onclick="toggleCRT()" style="width:100%; margin-top:15px; border-color: #ff4466; color: #ff4466;">📺 TOGGLE CRT MODE</button>
                    <div id="settings-modal" class="glass-panel">
                        <h4 style="color:var(--gold); margin:0 0 10px 0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                        <div id="track-list">
                            <button class="track-item nav-btn" onclick="changeTrack('audio/background_theme.mp3', 'Starmaker')">01. Starmaker Main</button>
                            <button class="track-item nav-btn" onclick="changeTrack('audio/FallApart.mp3', 'Fall Apart')">02. Fall Apart</button>
                            <button class="track-item nav-btn" onclick="changeTrack('audio/GoBack.mp3', 'Go Back')">03. Go Back</button>
                            <button class="track-item nav-btn" onclick="changeTrack('audio/Neo.mp3', 'Neo')">04. Neo</button>
                        </div>
                        <p id="current-track-name">STATUS: ONLINE // <span id="track-display">Starmaker</span></p>
                    </div>
                </div>
                <div class="music-controls">
                    <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0;">🔊</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <h2 style="color:var(--gold); border-bottom:1px solid var(--box-border); padding-bottom:10px; letter-spacing: 2px;">MORE FROM THE STUDIO</h2>
            <p style="color: #ccc; margin-bottom: 30px;">Select a title to view details and screenshots.</p>
            
            <div id="games-grid" class="grid-view"></div>
        </div>
    </div>

    <div id="store-lightbox" class="studio-lightbox" onclick="closeStoreModal()">
        <div class="store-modal" onclick="event.stopPropagation()">
            
            <button class="close-modal-btn" onclick="closeStoreModal()">×</button>
            
            <div class="store-header">
                <div class="store-title-area">
                    <h2 id="modal-title">Game Title</h2>
                </div>
            </div>

            <div class="store-body">
                <div class="store-gallery">
                    <img id="main-preview" class="main-screenshot" src="">
                    <div id="thumb-container" class="thumbnail-strip">
                        </div>
                </div>

                <div class="store-details">
                    <img id="modal-capsule" class="store-capsule" src="">
                    
                    <p id="modal-desc">Game description goes here.</p>
                    
                    <div class="tags-header">Popular user-defined tags for this product:</div>
                    <div id="modal-tags" class="game-tags">
                        </div>

                    <a href="#" id="modal-cta" target="_blank" class="store-cta-btn">Go to Game's Page</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    (() => {
        let gamesData = {};
        let currentScreenshots = [];

        async function loadData() {
            try {
                const response = await fetch('studioGames.json');
                if (!response.ok) throw new Error("Database file not found");
                gamesData = await response.json();
                renderGrid();
            } catch (err) { 
                console.error("Error loading studio games:", err);
                document.getElementById('games-grid').innerHTML = "<p style='color:red;'>Failed to load Studio Games Database.</p>";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('games-grid');
            
            grid.innerHTML = Object.keys(gamesData).map(key => {
                const game = gamesData[key];
                return `
                    <div class="char-card" style="cursor:pointer;" onclick="openStoreModal('${key}')">
                        <img src="${game.thumbnail}" style="height:220px;">
                        <h3 style="margin:10px 0 15px 0; color:var(--gold);">${game.name}</h3>
                    </div>
                `;
            }).join('');
        }

        window.openStoreModal = function(key) {
            if(typeof playSnd === 'function') playSnd();
            const game = gamesData[key];
            
            // Populate Right Column text & images
            document.getElementById('modal-title').innerText = game.name;
            document.getElementById('modal-capsule').src = game.thumbnail;
            document.getElementById('modal-desc').innerText = game.description;
            document.getElementById('modal-cta').href = game.url;

            // Generate Tags (using Steam blue pill styling)
            document.getElementById('modal-tags').innerHTML = game.tags.map(tag => 
                `<span class="tag">${tag}</span>`
            ).join('');

            // Setup Left Column Gallery
            currentScreenshots = game.screenshots && game.screenshots.length > 0 ? game.screenshots : [game.thumbnail];
            
            // Render the bottom thumbnail strip
            document.getElementById('thumb-container').innerHTML = currentScreenshots.map((src, idx) => `
                <img src="${src}" class="thumb-img ${idx === 0 ? 'active' : ''}" onclick="setMainImage(${idx})" id="thumb-${idx}">
            `).join('');

            // Set the main image to the first one in the array
            setMainImage(0);

            // Show Modal
            document.getElementById('store-lightbox').style.display = 'flex';
        };

        window.setMainImage = function(index) {
            if(typeof playSnd === 'function') playSnd();
            
            // Swap the main preview image
            document.getElementById('main-preview').src = currentScreenshots[index];
            
            // Move the white border to the clicked thumbnail
            document.querySelectorAll('.thumb-img').forEach(el => el.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${index}`);
            if (activeThumb) activeThumb.classList.add('active');
        };

        window.closeStoreModal = function() {
            if(typeof playSnd === 'function') playSnd();
            document.getElementById('store-lightbox').style.display = 'none';
        };

        window.addEventListener('DOMContentLoaded', () => {
            if(typeof initMusic === 'function') initMusic();
            loadData();
        });
    })();
    </script>
</body>
</html>
