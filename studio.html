<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>STARMAKER | Studio Games</title>
    <script src="data.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* STEAM-STYLE MODAL CSS */
        .store-modal {
            background: rgba(10, 10, 15, 0.98);
            border: 1px solid var(--gold);
            border-radius: 12px;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .store-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--box-border);
            padding-bottom: 15px;
        }

        .store-title-area h2 {
            margin: 0;
            color: var(--gold);
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .store-cta-btn {
            background: linear-gradient(to right, #ff4466, #ff2a4f);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
            box-shadow: 0 0 15px rgba(255, 68, 102, 0.4);
        }

        .store-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 68, 102, 0.7);
        }

        .store-body {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        /* Gallery System */
        .store-gallery {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-screenshot {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: 1px solid var(--box-border);
            border-radius: 8px;
            object-fit: cover;
        }

        .thumbnail-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .thumbnail-strip::-webkit-scrollbar { height: 6px; }
        .thumbnail-strip::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

        .thumb-img {
            height: 70px;
            aspect-ratio: 16/9;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            opacity: 0.6;
            transition: all 0.2s ease;
        }

        .thumb-img:hover { opacity: 1; }
        .thumb-img.active {
            border-color: var(--gold);
            opacity: 1;
        }

        /* Details System */
        .store-details p {
            color: #ddd;
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 20px;
        }

        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            user-select: none;
        }

        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: gray;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal-btn:hover { color: white; }

        @media (max-width: 768px) {
            .store-body { grid-template-columns: 1fr; }
            .store-header { flex-direction: column; gap: 15px; }
            .store-cta-btn { width: 100%; text-align: center; }
            .close-modal-btn { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    
    <header>
        <div onclick="goHome()" style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink:0; cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;">
            STARMAKER DATABASE
        </div>

        <button class="hamburger" onclick="toggleMenu()">☰</button>

        <nav id="main-nav">
            <div class="nav-links">
                <a href="home.html" class="nav-btn">Home</a>
                <a href="characters.html" class="nav-btn">Characters</a>
                <a href="gallery.html" class="nav-btn">Gallery</a>
                <a href="minigames.html" class="nav-btn">Minigames</a>
                <a href="studio.html" class="nav-btn active">More Games</a>
            </div>

            <div class="mobile-divider"></div>

            <div class="nav-controls">
                <div class="settings-container">
                    <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1rem; padding: 8px 15px;">TRACKS 🎵</button>
                    <button class="nav-btn" onclick="toggleCRT()" style="width:100%; margin-top:15px; border-color: #ff4466; color: #ff4466;">📺 TOGGLE CRT MODE</button>
                    <div id="settings-modal" class="glass-panel">
                        <h4 style="color:var(--gold); margin:0 0 10px 0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                        <div id="track-list">
                            <button class="track-item nav-btn" onclick="changeTrack('audio/background_theme.mp3', 'Starmaker')">01. Starmaker Main</button>
                        </div>
                        <p id="current-track-name">STATUS: ONLINE // <span id="track-display">Starmaker</span></p>
                    </div>
                </div>
                <div class="music-controls">
                    <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0;">🔊</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <h2 style="color:var(--gold); border-bottom:1px solid var(--box-border); padding-bottom:10px; letter-spacing: 2px;">MORE FROM THE STUDIO</h2>
            <p style="color: #ccc; margin-bottom: 30px;">Select a title to view details and screenshots.</p>
            
            <div id="games-grid" class="grid-view"></div>
        </div>
    </div>

    <div id="store-lightbox" class="lightbox" onclick="closeStoreModal()">
        <div class="store-modal" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeStoreModal()">×</button>
            
            <div class="store-header">
                <div class="store-title-area">
                    <h2 id="modal-title">Game Title</h2>
                </div>
                <a href="#" id="modal-cta" target="_blank" class="store-cta-btn">GO TO GAME'S PAGE ↗</a>
            </div>

            <div class="store-body">
                <div class="store-gallery">
                    <img id="main-preview" class="main-screenshot" src="">
                    <div id="thumb-container" class="thumbnail-strip">
                        </div>
                </div>

                <div class="store-details">
                    <h3 style="color:var(--gold); font-size:0.9rem; margin-top:0;">ABOUT THIS GAME</h3>
                    <p id="modal-desc">Game description goes here.</p>
                    
                    <h3 style="color:var(--gold); font-size:0.9rem;">TAGS</h3>
                    <div id="modal-tags" class="game-tags">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (() => {
        let gamesData = {};
        let currentScreenshots = [];

        async function loadData() {
            try {
                const response = await fetch('studioGames.json');
                if (!response.ok) throw new Error("Database file not found");
                gamesData = await response.json();
                renderGrid();
            } catch (err) { 
                console.error("Error loading studio games:", err);
                document.getElementById('games-grid').innerHTML = "<p style='color:red;'>Failed to load Studio Games Database.</p>";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('games-grid');
            
            grid.innerHTML = Object.keys(gamesData).map(key => {
                const game = gamesData[key];
                return `
                    <div class="char-card" style="cursor:pointer;" onclick="openStoreModal('${key}')">
                        <img src="${game.thumbnail}" style="height:220px;">
                        <h3 style="margin:10px 0 15px 0; color:var(--gold);">${game.name}</h3>
                    </div>
                `;
            }).join('');
        }

        // Expose to window so onclick can see it
        window.openStoreModal = function(key) {
            if(typeof playSnd === 'function') playSnd();
            const game = gamesData[key];
            
            // Text & Links
            document.getElementById('modal-title').innerText = game.name;
            document.getElementById('modal-desc').innerText = game.description;
            document.getElementById('modal-cta').href = game.url;

            // Tags
            document.getElementById('modal-tags').innerHTML = game.tags.map(tag => 
                `<span class="tag">${tag}</span>`
            ).join('');

            // Screenshots Gallery
            currentScreenshots = game.screenshots || [game.thumbnail];
            
            // Set initial main image to the first screenshot
            setMainImage(0);

            // Render thumbnails
            document.getElementById('thumb-container').innerHTML = currentScreenshots.map((src, idx) => `
                <img src="${src}" class="thumb-img ${idx === 0 ? 'active' : ''}" onclick="setMainImage(${idx})" id="thumb-${idx}">
            `).join('');

            // Show Modal
            document.getElementById('store-lightbox').style.display = 'flex';
        };

        window.setMainImage = function(index) {
            if(typeof playSnd === 'function') playSnd();
            
            // Update big picture
            document.getElementById('main-preview').src = currentScreenshots[index];
            
            // Update active state on thumbnails
            document.querySelectorAll('.thumb-img').forEach(el => el.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${index}`);
            if (activeThumb) activeThumb.classList.add('active');
        };

        window.closeStoreModal = function() {
            if(typeof playSnd === 'function') playSnd();
            document.getElementById('store-lightbox').style.display = 'none';
        };

        window.addEventListener('DOMContentLoaded', () => {
            if(typeof initMusic === 'function') initMusic();
            loadData();
        });
    })();
    </script>
</body>
</html>
