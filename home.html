<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Starmaker | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        .home-display {
            position: relative;
            width: 100%;
            height: 75vh;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid var(--box-border);
            margin-top: 20px;
            /* Scanline Effect Overlay */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
        }

        /* Surveillance Style for Floating Images */
        .floating-img {
            position: absolute;
            width: 250px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            z-index: 5;
            /* Adds the "Old CCTV" look */
            filter: sepia(0.3) hue-rotate(90deg) brightness(0.8) contrast(1.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .floating-img:hover {
            transform: scale(1.1) rotate(1deg);
            border-color: var(--gold);
            filter: none; /* Clear the filter on hover to see the real image */
            z-index: 100;
        }

        /* Blinking REC Icon */
        .rec-box {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px #ff0000;
            pointer-events: none;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #ff0000;
            border-radius: 50%;
            animation: blinker 1s step-start infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #lb-img { max-width: 90%; max-height: 90%; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    
    <header>
    <div style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink:0;">
        STARMAKER DATABASE
    </div>

    <button class="hamburger" onclick="toggleMenu()">☰</button>

    <nav id="main-nav">
        <div class="nav-links">
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </div>

        <div class="mobile-divider"></div>

        <div class="nav-controls">
            <div class="settings-container">
                <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1rem; padding: 8px 15px;">TRACKS ⚙️</button>
                <div id="settings-modal" class="glass-panel">
                    <h4 style="color:var(--gold); margin:0 0 10px 0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                    <div id="track-list">
                        <button class="track-item nav-btn" onclick="changeTrack('audio/background_theme.mp3', 'Starmaker')">01. Starmaker Main</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/FallApart.mp3', 'Fall Apart')">02. Fall Apart</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/GoBack.mp3', 'Go Back')">03. Go Back</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/Neo.mp3', 'Neo')">04. Neo</button>
                    </div>
                    <p id="current-track-name">STATUS: ONLINE // <span id="track-display">Starmaker</span></p>
                </div>
            </div>

            <div class="music-controls">
                <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0; display:flex; align-items:center;">🔊</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
            </div>
        </div>
    </nav>
    </header>
    
    <div class="container">
        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="color:var(--gold); margin: 0; letter-spacing: 2px;">LIVE ARCHIVE FEED</h2>
                <span style="color:var(--gold); font-size: 0.8rem; opacity: 0.6;">SIGNAL: STABLE</span>
            </div>
            
            <div class="home-display" id="float-container">
                <div class="rec-box">
                    <div class="dot"></div> REC
                </div>
                <div style="position:absolute; bottom:20px; right:20px; color:var(--gold); font-family:monospace; opacity:0.5; font-size:0.8rem;">
                    CAM_01 // [STARMAKER_LURKER_ROOT]
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="">
    </div>

    <script>
        // Updated paths to look inside images/home/
        const homeImages = [
            'images/previews/FatherSon.png',
            'images/previews/AmeliaEnding.png',
            'images/previews/CharlotteHappy.png',
            'images/previews/HimariEnding.png',
            'images/previews/StopAsking.png'
        ];

        const container = document.getElementById('float-container');

        function initHome() {
            homeImages.forEach((src) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'floating-img';
                
                // Random spawn within the container
                img.style.top = Math.random() * 50 + 10 + "%";
                img.style.left = Math.random() * 60 + 10 + "%";

                img.onclick = () => {
                    playSnd();
                    document.getElementById('lb-img').src = src;
                    document.getElementById('lightbox').style.display = 'flex';
                };

                container.appendChild(img);
                animateImage(img);
            });
        }

        function animateImage(el) {
            let posX = parseFloat(el.style.left);
            let posY = parseFloat(el.style.top);
            // Drifting speeds
            let velX = (Math.random() - 0.5) * 0.05;
            let velY = (Math.random() - 0.5) * 0.05;

            function move() {
                posX += velX;
                posY += velY;

                // Bounce boundaries
                if (posX < 2 || posX > 75) velX *= -1;
                if (posY < 2 || posY > 70) velY *= -1;

                el.style.left = posX + "%";
                el.style.top = posY + "%";
                requestAnimationFrame(move);
            }
            move();
        }

        window.addEventListener('DOMContentLoaded', () => {
            initMusic();
            initHome();
        });
    </script>
</body>
</html>
