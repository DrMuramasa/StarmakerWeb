<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starmaker | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        /* Floating Canvas Area */
        .home-display {
            position: relative;
            width: 100%;
            height: 75vh;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 1px solid var(--box-border);
            margin-top: 20px;
        }

        /* Floating Image Style */
        .floating-img {
            position: absolute;
            width: 250px;
            border: 2px solid var(--box-border);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .floating-img:hover {
            transform: scale(1.05);
            border-color: var(--gold);
            z-index: 100;
        }

        /* Lightbox for Full View */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #lb-img { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    
    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>

        <div class="music-controls">
            <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0;">🔊</button>
            <label>VOL</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
        </div>

        <nav>
            <a href="home.html" class="nav-btn active">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <h2 style="color:var(--gold); margin-top:0; letter-spacing: 2px;">RECENT ARCHIVES</h2>
            
            <div class="home-display" id="float-container">
                </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="">
    </div>

    <script>
        // Use the images you provided
        const homeImages = [
            'FatherSon.png',
            'AmeliaEnding.png',
            'CharlotteHappy.png',
            'HimariEnding.png'
        ];

        const container = document.getElementById('float-container');

        function initHome() {
            homeImages.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'floating-img';
                
                // Random start positions
                img.style.top = Math.random() * 60 + "%";
                img.style.left = Math.random() * 70 + "%";

                // Click to enlarge
                img.onclick = () => {
                    playSnd();
                    document.getElementById('lb-img').src = src;
                    document.getElementById('lightbox').style.display = 'flex';
                };

                container.appendChild(img);
                animateImage(img);
            });
        }

        function animateImage(el) {
            let posX = parseFloat(el.style.left);
            let posY = parseFloat(el.style.top);
            let velX = (Math.random() - 0.5) * 0.1; // Slow drift speed
            let velY = (Math.random() - 0.5) * 0.1;

            function move() {
                posX += velX;
                posY += velY;

                // Bounce off walls
                if (posX < 0 || posX > 80) velX *= -1;
                if (posY < 0 || posY > 70) velY *= -1;

                el.style.left = posX + "%";
                el.style.top = posY + "%";
                requestAnimationFrame(move);
            }
            move();
        }

        window.addEventListener('DOMContentLoaded', () => {
            initMusic();
            initHome();
        });
    </script>
</body>
</html>
