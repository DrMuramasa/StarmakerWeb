<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fanart Gallery</title>
    <style>
        body { background-color: #121212; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* --- UI Controls --- */
        .controls {
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
            margin-bottom: 40px; position: sticky; top: 10px; z-index: 100;
        }

        #searchBar {
            padding: 10px 20px; border-radius: 25px; border: 1px solid #444;
            background: #1e1e1e; color: white; width: 300px; outline: none;
        }

        .toggle-btn {
            padding: 10px 20px; border-radius: 25px; border: 1px solid #00d4ff;
            background: transparent; color: #00d4ff; cursor: pointer; transition: 0.3s;
        }

        .toggle-btn.active { background: #00d4ff; color: #121212; }

        /* --- Gallery Layout --- */
        .gallery-container { column-count: 3; column-gap: 20px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .gallery-container { column-count: 2; } }
        @media (max-width: 600px) { .gallery-container { column-count: 1; } }

        .art-card {
            background: #1e1e1e; margin-bottom: 20px; break-inside: avoid;
            border-radius: 12px; overflow: hidden; position: relative;
            border: 1px solid #333; transition: transform 0.2s ease;
        }
        .art-card:hover { transform: translateY(-5px); border-color: #444; }
        .art-card img { width: 100%; display: block; cursor: pointer; }

        /* --- Indicators & Overlays --- */
        .bundle-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 212, 255, 0.9); color: #000;
            padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem;
        }

        /* 1. Visual Indicator: Red Heart */
        .fav-heart {
            position: absolute; bottom: 10px; right: 10px;
            font-size: 1.5rem; cursor: pointer;
            color: rgba(255, 255, 255, 0.3); /* Dim white when inactive */
            transition: 0.2s; user-select: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .fav-heart.active {
            color: #ff4b2b; /* Solid Red */
            filter: drop-shadow(0 0 8px rgba(255, 75, 43, 0.6));
        }

        .art-info { padding: 12px; font-size: 0.85rem; }
        .creator-tag { color: #00d4ff; font-weight: bold; }

        /* --- Lightbox & 2. Navigation Areas --- */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }

        #lightbox img { max-width: 85%; max-height: 80%; z-index: 5; position: relative; border-radius: 4px; }

        .nav-area {
            position: absolute; top: 0; height: 100%; width: 25%; 
            z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: rgba(255,255,255,0.1); transition: 0.3s;
        }
        .nav-area:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.03); }
        .nav-area.left { left: 0; }
        .nav-area.right { right: 0; }

        .variant-picker { margin-top: 20px; display: flex; gap: 10px; z-index: 15; }
        .variant-thumb { width: 50px; height: 50px; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 4px; opacity: 0.6; }
        .variant-thumb.active { border-color: #00d4ff; opacity: 1; }
    </style>
</head>
<body>

<header style="text-align: center; padding: 20px;">
    <h1>Fanart Vault</h1>
</header>

<div class="controls">
    <input type="text" id="searchBar" placeholder="Search Creator..." oninput="renderGallery()">
    <button id="favToggle" class="toggle-btn" onclick="toggleFavView()">Show Favorites Only</button>
</div>

<div class="gallery-container" id="gallery"></div>

<div id="lightbox" onclick="closeLightbox(event)">
    <div class="nav-area left" onclick="prevVariant(event)">‹</div>
    <img id="lightbox-img" src="">
    <div class="nav-area right" onclick="nextVariant(event)">›</div>
    
    <div class="variant-picker" id="variantPicker" onclick="event.stopPropagation()"></div>
</div>

<script>
    const GITHUB_USER = 'DrMuramasa';
    const REPO_NAME = 'StarmakerWeb';
    const FOLDER_PATH = 'images/artworks/';

    let allBundles = {};
    let favorites = JSON.parse(localStorage.getItem('fanart_favs')) || [];
    let showOnlyFavs = false;
    
    // Tracking for Lightbox Navigation
    let currentOpenBundleKey = null;
    let currentVariantIndex = 0;

    async function init() {
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_PATH}`);
            const files = await response.json();
            
            files.forEach(file => {
                if (!file.name.match(/\.(jpe?g|png|webp)$/i)) return;

                const [mainPart, variantPart] = file.name.split('_alt_');
                const variantName = variantPart ? variantPart.split('.')[0] : 'Original';
                const parts = mainPart.split('_');
                const creator = parts[0] || 'Unknown';
                const title = parts.slice(1).join('_') || 'Untitled';
                
                const bundleKey = `${creator}_${title}`;

                if (!allBundles[bundleKey]) {
                    allBundles[bundleKey] = { creator, title, variants: [] };
                }
                allBundles[bundleKey].variants.push({ name: variantName, url: file.download_url, id: file.path });
            });
            renderGallery();
        } catch(e) { console.error("Check GitHub settings.", e); }
    }

    function renderGallery() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const container = document.getElementById('gallery');
        container.innerHTML = '';

        Object.keys(allBundles).forEach(key => {
            const bundle = allBundles[key];
            // Check if any variant in this bundle is favorited
            const isFav = bundle.variants.some(v => favorites.includes(v.id));

            if (query && !bundle.creator.toLowerCase().includes(query)) return;
            if (showOnlyFavs && !isFav) return;

            const mainImg = bundle.variants[0];
            const card = document.createElement('div');
            card.className = 'art-card';
            
            card.innerHTML = `
                ${bundle.variants.length > 1 ? `<div class="bundle-badge">${bundle.variants.length} VERSIONS</div>` : ''}
                <img src="${mainImg.url}" onclick="openLightbox('${key}')" loading="lazy">
                <div class="art-info">
                    <span class="creator-tag">@${bundle.creator}</span><br>
                    <small>${bundle.title.replace(/_/g, ' ')}</small>
                </div>
                <div class="fav-heart ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${mainImg.id}')">❤</div>
            `;
            container.appendChild(card);
        });
    }

    // --- Lightbox Logic ---
    function openLightbox(key) {
        currentOpenBundleKey = key;
        currentVariantIndex = 0;
        updateLightboxView();
        document.getElementById('lightbox').style.display = 'flex';
    }

    function updateLightboxView() {
        const bundle = allBundles[currentOpenBundleKey];
        const variant = bundle.variants[currentVariantIndex];
        
        document.getElementById('lightbox-img').src = variant.url;
        
        const picker = document.getElementById('variantPicker');
        picker.innerHTML = '';

        if (bundle.variants.length > 1) {
            bundle.variants.forEach((v, idx) => {
                const thumb = document.createElement('img');
                thumb.src = v.url;
                thumb.className = `variant-thumb ${idx === currentVariantIndex ? 'active' : ''}`;
                thumb.onclick = () => { currentVariantIndex = idx; updateLightboxView(); };
                picker.appendChild(thumb);
            });
        }
    }

    function nextVariant(e) {
        if(e) e.stopPropagation();
        const bundle = allBundles[currentOpenBundleKey];
        currentVariantIndex = (currentVariantIndex + 1) % bundle.variants.length;
        updateLightboxView();
    }

    function prevVariant(e) {
        if(e) e.stopPropagation();
        const bundle = allBundles[currentOpenBundleKey];
        currentVariantIndex = (currentVariantIndex - 1 + bundle.variants.length) % bundle.variants.length;
        updateLightboxView();
    }

    function closeLightbox(e) { 
        if (e.target.id === 'lightbox' || e.target.className.includes('nav-area')) {
            if(e.target.className.includes('nav-area')) return; // handled by specific nav functions
            document.getElementById('lightbox').style.display = 'none'; 
            currentOpenBundleKey = null;
        }
    }

    // Keyboard Navigation
    window.addEventListener('keydown', (e) => {
        if (!currentOpenBundleKey) return;
        if (e.key === "ArrowRight") nextVariant();
        if (e.key === "ArrowLeft") prevVariant();
        if (e.key === "Escape") { 
            document.getElementById('lightbox').style.display = 'none'; 
            currentOpenBundleKey = null;
        }
    });

    // --- Favorites Logic ---
    function toggleFavorite(e, id) {
        e.stopPropagation(); // Don't open lightbox when clicking heart
        if (favorites.includes(id)) {
            favorites = favorites.filter(favId => favId !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('fanart_favs', JSON.stringify(favorites));
        renderGallery();
    }

    function toggleFavView() {
        showOnlyFavs = !showOnlyFavs;
        document.getElementById('favToggle').classList.toggle('active');
        renderGallery();
    }

    init();
</script>
</body>
</html>
