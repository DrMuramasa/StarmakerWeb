<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanart Gallery</title>
    <style>
        /* 1. Visual Aesthetic: Dark Mode Foundation */
        body {
            background-color: #121212;
            color: #eeeeee;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00d4ff; /* Electric Blue Accent */
        }

        /* 2. The Layout: Dynamic Masonry */
        .gallery-container {
            column-count: 3;
            column-gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 900px) { .gallery-container { column-count: 2; } }
        @media (max-width: 600px) { .gallery-container { column-count: 1; } }

        .art-card {
            background: #1e1e1e;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        /* 3. Interaction & The Wow Factor */
        .art-card:hover {
            transform: scale(1.02);
            border-color: #00d4ff;
        }

        .art-card img {
            width: 100%;
            display: block;
            height: auto;
        }

        .art-info {
            padding: 10px;
            font-size: 0.9rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
        }

        /* Simple Lightbox Style */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90% ;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<header>
    <h1>Community Fanart</h1>
    <p>Celebrating dynamic silhouettes and creative vision.</p>
</header>

<div class="gallery-container" id="gallery">
    </div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Full size view">
</div>

<script>
    // CONFIGURATION: Update these three lines
    const GITHUB_USER = 'DrMuramasa';
    const REPO_NAME = 'StarmakerWeb';
    const FOLDER_PATH = 'images/artworks/'; // e.g., 'assets/fanart'

    async function fetchArtworks() {
        const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_PATH}`;
        const gallery = document.getElementById('gallery');

        try {
            const response = await fetch(apiUrl);
            const files = await response.json();

            // Filter for image files only
            const images = files.filter(file => 
                file.name.match(/\.(jpe?g|png|gif|webp)$/i)
            );

            images.forEach(image => {
                const card = document.createElement('div');
                card.className = 'art-card';
                
                // Use the raw download URL for the source
                const imgUrl = image.download_url;
                
                card.innerHTML = `
                    <img src="${imgUrl}" alt="${image.name}" loading="lazy">
                    <div class="art-info">${image.name.split('.')[0]}</div>
                `;

                card.onclick = () => {
                    document.getElementById('lightbox-img').src = imgUrl;
                    document.getElementById('lightbox').style.display = 'flex';
                };

                gallery.appendChild(card);
            });
        } catch (error) {
            console.error('Error fetching art:', error);
            gallery.innerHTML = '<p>Failed to load gallery. Check your GitHub paths.</p>';
        }
    }

    fetchArtworks();
</script>

</body>
</html>
