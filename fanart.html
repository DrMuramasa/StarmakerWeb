<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fanart Gallery</title>
    <style>
        body { background-color: #121212; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* --- UI Controls --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        #searchBar {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: white;
            width: 300px;
        }

        .toggle-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active { background: #00d4ff; color: #121212; }

        /* --- Gallery Layout --- */
        .gallery-container { column-count: 3; column-gap: 20px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .gallery-container { column-count: 2; } }
        @media (max-width: 600px) { .gallery-container { column-count: 1; } }

        .art-card {
            background: #1e1e1e;
            margin-bottom: 20px;
            break-inside: avoid;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
        }

        .art-card img { width: 100%; display: block; cursor: pointer; }

        /* --- Indicators & Overlays --- */
        .bundle-badge {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0, 212, 255, 0.9);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            pointer-events: none;
        }

        .fav-heart {
            position: absolute;
            bottom: 10px; right: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            filter: grayscale(1) brightness(2);
            transition: 0.2s;
        }

        .fav-heart.active { filter: grayscale(0) brightness(1); }

        .art-info { padding: 12px; font-size: 0.85rem; }
        .creator-tag { color: #00d4ff; font-weight: bold; }

        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        #lightbox img { max-width: 85%; max-height: 80%; }
        .variant-picker { margin-top: 20px; display: flex; gap: 10px; }
        .variant-thumb { width: 50px; height: 50px; object-fit: cover; cursor: pointer; border: 2px solid transparent; }
        .variant-thumb.active { border-color: #00d4ff; }
    </style>
</head>
<body>

<header style="text-align: center; padding: 20px;">
    <h1>Fanart Vault</h1>
</header>

<div class="controls">
    <input type="text" id="searchBar" placeholder="Search by Creator..." oninput="renderGallery()">
    <button id="favToggle" class="toggle-btn" onclick="toggleFavView()">Show Favorites Only</button>
</div>

<div class="gallery-container" id="gallery"></div>

<div id="lightbox" onclick="closeLightbox(event)">
    <img id="lightbox-img" src="">
    <div class="variant-picker" id="variantPicker" onclick="event.stopPropagation()"></div>
</div>

<script>
    const GITHUB_USER = 'DrMuramasa';
    const REPO_NAME = 'StarmakerWeb';
    const FOLDER_PATH = 'images/artworks/';

    let allBundles = {}; // Grouped data
    let favorites = JSON.parse(localStorage.getItem('fanart_favs')) || [];
    let showOnlyFavs = false;

    async function init() {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        
        files.forEach(file => {
            if (!file.name.match(/\.(jpe?g|png|webp)$/i)) return;

            // PARSING LOGIC: Creator_Title_alt_Variant.png
            // Split by "_alt_" first to find variants
            const [mainPart, variantPart] = file.name.split('_alt_');
            const variantName = variantPart ? variantPart.split('.')[0] : 'Original';
            
            // Split the mainPart by "_" to find Creator and Title
            const parts = mainPart.split('_');
            const creator = parts[0] || 'Unknown';
            const title = parts.slice(1).join('_') || 'Untitled';
            
            const bundleKey = `${creator}_${title}`;

            if (!allBundles[bundleKey]) {
                allBundles[bundleKey] = {
                    creator: creator,
                    title: title,
                    variants: []
                };
            }
            allBundles[bundleKey].variants.push({
                name: variantName,
                url: file.download_url,
                id: file.path // Use path as unique ID
            });
        });
        renderGallery();
    }

    function renderGallery() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const container = document.getElementById('gallery');
        container.innerHTML = '';

        Object.keys(allBundles).forEach(key => {
            const bundle = allBundles[key];
            const isFav = bundle.variants.some(v => favorites.includes(v.id));

            // Filtering
            if (query && !bundle.creator.toLowerCase().includes(query)) return;
            if (showOnlyFavs && !isFav) return;

            const mainImg = bundle.variants[0];
            const card = document.createElement('div');
            card.className = 'art-card';
            
            card.innerHTML = `
                ${bundle.variants.length > 1 ? `<div class="bundle-badge">${bundle.variants.length} VERSIONS</div>` : ''}
                <img src="${mainImg.url}" onclick="openLightbox('${key}')" loading="lazy">
                <div class="art-info">
                    <span class="creator-tag">@${bundle.creator}</span><br>
                    <small>${bundle.title.replace(/_/g, ' ')}</small>
                </div>
                <div class="fav-heart ${isFav ? 'active' : ''}" onclick="toggleFavorite('${mainImg.id}')">❤</div>
            `;
            container.appendChild(card);
        });
    }

    function openLightbox(key) {
        const bundle = allBundles[key];
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const picker = document.getElementById('variantPicker');

        lbImg.src = bundle.variants[0].url;
        picker.innerHTML = '';

        if (bundle.variants.length > 1) {
            bundle.variants.forEach((v, index) => {
                const thumb = document.createElement('img');
                thumb.src = v.url;
                thumb.className = `variant-thumb ${index === 0 ? 'active' : ''}`;
                thumb.onclick = () => {
                    lbImg.src = v.url;
                    document.querySelectorAll('.variant-thumb').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                };
                picker.appendChild(thumb);
            });
        }

        lb.style.display = 'flex';
    }

    function closeLightbox(e) { if (e.target.id === 'lightbox') e.target.style.display = 'none'; }

    function toggleFavorite(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(favId => favId !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('fanart_favs', JSON.stringify(favorites));
        renderGallery();
    }

    function toggleFavView() {
        showOnlyFavs = !showOnlyFavs;
        document.getElementById('favToggle').classList.toggle('active');
        renderGallery();
    }

    init();
</script>
</body>
</html>
