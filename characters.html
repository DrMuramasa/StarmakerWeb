<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Queen | Characters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    <header>
        <div style="color:var(--gold); font-weight:bold;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn active">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div id="mosaic-view">
                <h2 style="color:var(--gold); border-bottom:1px solid var(--box-border);">SUBJECT ARCHIVES</h2>
                <div id="char-grid" class="grid-view"></div>
            </div>

            <div id="guide-view" style="display:none;">
                <button class="nav-btn" onclick="closeGuide()">← BACK</button>
                <div style="display:grid; grid-template-columns: 300px 1fr; gap:30px; margin-top:20px;">
                    <div id="side-info">
                        <img id="guide-sprite" style="width:100%; border:1px solid var(--gold);">
                        <h2 id="guide-name" style="color:var(--gold);"></h2>
                    </div>
                    <div id="quest-area" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:10px;">
                        <h3 id="quest-title" style="color:var(--gold);"></h3>
                        <div id="quest-steps"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const charData = {
            "josef": { name: "Josef", sprite: "images/characters/Josef/josef_sprite.png", bg: "images/characters/Josef/Josef_BG.jpg", qTitle: "Friday Beer", qSteps: "Step 1: Get beer. Step 2: Talk to Josef." },
            "amelia": { name: "Amelia", sprite: "images/characters/Amelia/amelia_sprite.png", bg: "images/characters/Amelia/Amelia_BG.png", qTitle: "Coffee Grind", qSteps: "Step 1: Work shifts. Step 2: Be fit." }
        };

        function init() {
            const grid = document.getElementById('char-grid');
            Object.keys(charData).forEach(key => {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => openGuide(key);
                card.innerHTML = `<img src="${charData[key].sprite}"><h3>${charData[key].name}</h3>`;
                grid.appendChild(card);
            });
        }

        function openGuide(key) {
            const char = charData[key];
            document.getElementById('mosaic-view').style.display = 'none';
            document.getElementById('guide-view').style.display = 'block';
            document.getElementById('guide-sprite').src = char.sprite;
            document.getElementById('guide-name').innerText = char.name;
            document.getElementById('quest-title').innerText = char.qTitle;
            document.getElementById('quest-steps').innerText = char.qSteps;
            document.getElementById('master-bg').style.backgroundImage = `url('${char.bg}')`;
        }

        function closeGuide() {
            document.getElementById('mosaic-view').style.display = 'block';
            document.getElementById('guide-view').style.display = 'none';
            document.getElementById('master-bg').style.backgroundImage = "url('backgroundImg.gif')";
        }
        init();
    </script>
</body>
</html>
