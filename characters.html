<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Queen | Characters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    <header>
        <div style="color:var(--gold); font-weight:bold;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn active">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div id="mosaic-view">
                <h2 style="color:var(--gold); border-bottom: 1px solid var(--box-border); padding-bottom: 10px;">SUBJECT ARCHIVES</h2>
                <div id="char-grid" class="grid-view"></div>
            </div>

            <div id="guide-view" style="display:none;">
                <button class="nav-btn" style="margin-bottom: 25px;" onclick="closeGuide()">← BACK</button>
                <div style="display:grid; grid-template-columns: 320px 250px 1fr; gap: 20px;">
                    <div class="sprite-viewer"><div id="display-sprite"></div><h2 id="display-name" style="color:var(--gold);"></h2><p id="display-bio"></p></div>
                    <div id="quest-list" style="background:rgba(0,0,0,0.5); padding:15px; border-radius:10px;"></div>
                    <div style="background:rgba(0,0,0,0.5); padding:20px; border-radius:10px;">
                        <h2 id="q-title" style="color:var(--gold);"></h2>
                        <div id="q-steps"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function init() {
            const grid = document.getElementById('char-grid');
            for(let key in characterData) {
                const char = characterData[key];
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => openGuide(key);
                card.innerHTML = `<img src="${char.sprite}"><h3>${char.name}</h3>`;
                grid.appendChild(card);
            }
        }

        function openGuide(key) {
            const char = characterData[key];
            document.getElementById('mosaic-view').style.display = 'none';
            document.getElementById('guide-view').style.display = 'block';
            document.getElementById('master-bg').style.backgroundImage = `url('${char.bg}')`;
            document.getElementById('display-sprite').innerHTML = `<img src="${char.sprite}" style="width:100%">`;
            document.getElementById('display-name').innerText = char.name;
            document.getElementById('display-bio').innerText = char.bio;
            
            const qList = document.getElementById('quest-list');
            qList.innerHTML = "";
            char.quests.forEach((q, i) => {
                const item = document.createElement('div');
                item.style = "padding:10px; cursor:pointer; border-bottom:1px solid #333";
                item.innerText = q.name;
                item.onclick = () => showQuest(q);
                qList.appendChild(item);
            });
            showQuest(char.quests[0]);
        }

        function showQuest(q) {
            document.getElementById('q-title').innerText = q.title;
            document.getElementById('q-steps').innerHTML = q.steps.map(s => `<p>▶ ${s.t} <br><small style="color:var(--req-color)">${s.r}</small></p>`).join('');
        }

        function closeGuide() {
            document.getElementById('mosaic-view').style.display = 'block';
            document.getElementById('guide-view').style.display = 'none';
            document.getElementById('master-bg').style.backgroundImage = "url('backgroundImg.gif')";
        }

        init();
    </script>
</body>
</html>
