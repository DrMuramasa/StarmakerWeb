<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STARMAKER | Characters</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script> 
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    
    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>
        <nav>
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn active">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div id="mosaic-view">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--box-border); padding-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="color:var(--gold); margin:0;">CHARACTER ARCHIVES</h2>
                    <input type="text" id="char-search" placeholder="Search name..." oninput="filterChars()" 
                        style="background:rgba(0,0,0,0.5); border:1px solid var(--gold); color:white; padding:8px 15px; border-radius:20px; outline:none; width: 200px;">
                </div>
                <div id="char-grid" class="grid-view" style="margin-top:20px;"></div>
            </div>

            <div id="guide-view" style="display:none;">
                <button class="nav-btn" onclick="closeGuide()">← BACK</button>
                <div class="char-detail-layout">
                    <div class="char-img-container" style="position:relative;">
                        <div id="fav-star" onclick="toggleFavorite()" style="position:absolute; top:10px; right:10px; font-size:2rem; cursor:pointer; text-shadow: 0 0 10px black;">☆</div>
                        <img id="guide-sprite" style="width:100%; border:1px solid var(--gold); border-radius: 5px;">
                        <h2 id="guide-name" style="color:var(--gold); letter-spacing: 2px;"></h2>
                    </div>

                    <div class="quest-menu-container">
                        <h3 style="color:var(--gold); font-size: 0.9rem;">SELECT QUEST</h3>
                        <div id="quest-menu-list"></div>
                    </div>

                    <div class="step-viewer" id="step-display">
                        <p style="color:gray; font-style:italic;">Select a quest to view steps...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    let charData = {};
    let activeCharKey = "";
    let favorites = JSON.parse(localStorage.getItem('sm_favorites')) || [];

    async function loadData() {
        try {
            const response = await fetch('database.json');
            charData = await response.json();
            renderGrid(charData);
        } catch (err) { console.error("Database error:", err); }
    }

    // Renders the grid based on search/favorites
    function renderGrid(dataToRender) {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = Object.keys(dataToRender).map(key => {
            const isFav = favorites.includes(key);
            return `
                <div class="char-card ${isFav ? 'fav-card' : ''}" onclick="openGuide('${key}')">
                    <div class="mini-star">${isFav ? '★' : ''}</div>
                    <img src="${dataToRender[key].sprite}">
                    <h3>${dataToRender[key].name}</h3>
                </div>
            `;
        }).join('');
    }

    function filterChars() {
        const query = document.getElementById('char-search').value.toLowerCase();
        const filtered = {};
        Object.keys(charData).forEach(key => {
            if (charData[key].name.toLowerCase().includes(query)) {
                filtered[key] = charData[key];
            }
        });
        renderGrid(filtered);
    }

    function openGuide(key) {
        activeCharKey = key;
        if(typeof playSnd === 'function') playSnd();
        const char = charData[key];
        document.getElementById('mosaic-view').style.display = 'none';
        document.getElementById('guide-view').style.display = 'block';
        document.getElementById('guide-sprite').src = char.sprite;
        document.getElementById('guide-name').innerText = char.name;
        document.getElementById('master-bg').style.backgroundImage = `url('${char.bg}')`;

        // Update Star Icon
        updateStarUI();

        const menu = document.getElementById('quest-menu-list');
        menu.innerHTML = char.quests.map((q, index) => `
            <div class="quest-nav-item" onclick="showSteps('${key}', ${index})">${q.title}</div>
        `).join('');

        document.getElementById('step-display').innerHTML = '<p style="color:gray;">Select a quest to see details.</p>';
        history.pushState({ guideOpen: true }, "");
    }

    function toggleFavorite() {
        const index = favorites.indexOf(activeCharKey);
        if (index > -1) {
            favorites.splice(index, 1); // Remove
        } else {
            favorites.push(activeCharKey); // Add
        }
        localStorage.setItem('sm_favorites', JSON.stringify(favorites));
        updateStarUI();
        if(typeof playSnd === 'function') playSnd();
    }

    function updateStarUI() {
        const star = document.getElementById('fav-star');
        star.innerText = favorites.includes(activeCharKey) ? "★" : "☆";
        star.style.color = favorites.includes(activeCharKey) ? "var(--gold)" : "white";
    }

    function showSteps(charKey, questIndex) {
        if(typeof playSnd === 'function') playSnd();
        const quest = charData[charKey].quests[questIndex];
        const display = document.getElementById('step-display');
        display.innerHTML = `<h3 style="color:var(--gold); margin-top:0;">${quest.title}</h3>
            <ul style="list-style:none; padding:0;">${quest.steps.map(s => `<li style="margin-bottom:12px; color:white;"><span style="color:var(--gold);">▶</span> ${s}</li>`).join('')}</ul>`;
        document.querySelectorAll('.quest-nav-item').forEach((el, i) => el.classList.toggle('active-quest', i === questIndex));
    }

    function closeGuide() {
        renderGrid(charData); // Refresh grid to show new stars
        document.getElementById('mosaic-view').style.display = 'block';
        document.getElementById('guide-view').style.display = 'none';
        document.getElementById('master-bg').style.backgroundImage = "url('backgroundImg.gif')";
        if (history.state?.guideOpen) history.back();
    }

    window.onpopstate = () => { if (document.getElementById('guide-view').style.display === 'block') closeGuide(); };
    window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
