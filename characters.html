<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STARMAKER | Characters</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script> 
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    
    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>
        <nav>
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn active">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div id="mosaic-view">
                <h2 style="color:var(--gold); border-bottom:1px solid var(--box-border); padding-bottom: 10px;">CHARACTER ARCHIVES</h2>
                <div id="char-grid" class="grid-view"></div>
            </div>

            <div id="guide-view" style="display:none;">
                <button class="nav-btn" onclick="closeGuide()">← BACK</button>
                <div class="char-detail-layout">
                    <div class="char-img-container">
                        <img id="guide-sprite">
                        <h2 id="guide-name" style="color:var(--gold);"></h2>
                    </div>
                    <div id="quest-area" class="quest-section">
                        <div id="quest-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    let charData = {}; // Global variable to store loaded data

    async function loadData() {
        try {
            const response = await fetch('database.json');
            charData = await response.json();
            initGrid();
        } catch (err) { console.error("Database failed to load:", err); }
    }

    function initGrid() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = Object.keys(charData).map(key => `
            <div class="char-card" onclick="openGuide('${key}')">
                <img src="${charData[key].sprite}">
                <h3>${charData[key].name}</h3>
            </div>
        `).join('');
    }

    function openGuide(key) {
        const char = charData[key];
        document.getElementById('mosaic-view').style.display = 'none';
        document.getElementById('guide-view').style.display = 'block';
        document.getElementById('guide-sprite').src = char.sprite;
        document.getElementById('guide-name').innerText = char.name;
        document.getElementById('master-bg').style.backgroundImage = `url('${char.bg}')`;

        document.getElementById('quest-list').innerHTML = `
            <div class="quest-segment" onclick="this.classList.toggle('active'); playSnd();">
                <div class="quest-header">
                    <span>${char.qTitle}</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="quest-content">
                    <ul>${char.qSteps.map(s => `<li>${s}</li>`).join('')}</ul>
                </div>
            </div>
        `;
        history.pushState({ guideOpen: true }, "");
    }

    function closeGuide() {
        document.getElementById('mosaic-view').style.display = 'block';
        document.getElementById('guide-view').style.display = 'none';
        document.getElementById('master-bg').style.backgroundImage = "url('backgroundImg.gif')";
        if (history.state?.guideOpen) history.back();
    }

    window.onpopstate = () => { if (document.getElementById('guide-view').style.display === 'block') closeGuide(); };
    window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
