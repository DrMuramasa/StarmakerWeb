<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>STARMAKER | Characters</title>
    <script src="data.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper" id="master-bg"></div><div class="bg-overlay"></div>
    
    <header>
    <div style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink:0;">
        STARMAKER DATABASE
    </div>

    <button class="hamburger" onclick="toggleMenu()">☰</button>

    <nav id="main-nav">
        <div class="nav-links">
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </div>

        <div class="mobile-divider"></div>

        <div class="nav-controls">
            <div class="settings-container">
                <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1rem; padding: 8px 15px;">TRACKS ⚙️</button>
                <button class="nav-btn" onclick="toggleCRT()" style="width:100%; margin-top:15px; border-color: #ff4466; color: #ff4466;">📺 TOGGLE CRT MODE</button>
                <div id="settings-modal" class="glass-panel">
                    <h4 style="color:var(--gold); margin:0 0 10px 0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                    <div id="track-list">
                        <button class="track-item nav-btn" onclick="changeTrack('audio/background_theme.mp3', 'Starmaker')">01. Starmaker Main</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/FallApart.mp3', 'Fall Apart')">02. Fall Apart</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/GoBack.mp3', 'Go Back')">03. Go Back</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/Neo.mp3', 'Neo')">04. Neo</button>
                    </div>
                    <p id="current-track-name">STATUS: ONLINE // <span id="track-display">Starmaker</span></p>
                </div>
            </div>

            <div class="music-controls">
                <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0; display:flex; align-items:center;">🔊</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
            </div>
        </div>
    </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div id="mosaic-view">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--box-border); padding-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="color:var(--gold); margin:0; letter-spacing: 2px;">CHARACTER ARCHIVES</h2>
                    <input type="text" id="char-search" placeholder="Search name..." oninput="filterChars()" 
                        style="background:rgba(0,0,0,0.5); border:1px solid var(--gold); color:white; padding:8px 15px; border-radius:20px; outline:none; width: 220px;">
                </div>
                <div id="char-grid" class="grid-view" style="margin-top:20px;"></div>
            </div>

            <div id="guide-view" style="display:none;">
                <button class="nav-btn" onclick="closeGuide()">← BACK TO ARCHIVES</button>
                <div class="char-detail-layout">
                    <div class="char-img-container">
                        <img id="guide-sprite" style="width:100%; border:1px solid var(--gold); border-radius: 5px;">
                        <h2 id="guide-name" style="color:var(--gold); letter-spacing: 2px; margin-top:10px;"></h2>
                    </div>

                    <div class="quest-menu-container">
                        <h3 style="color:var(--gold); font-size: 0.9rem; letter-spacing:1px; margin-bottom:15px;">SELECT QUEST</h3>
                        <div id="quest-menu-list"></div>
                    </div>

                    <div class="step-viewer" id="step-display">
                        <p style="color:gray; font-style:italic;">Select a quest to view steps...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    let charData = {};

    async function loadData() {
        try {
            const response = await fetch('database.json');
            if (!response.ok) throw new Error("Could not find database.json");
            charData = await response.json();
            renderGrid(charData);
        } catch (err) { 
            console.error("Database error:", err); 
            document.getElementById('char-grid').innerHTML = `<p style="color:red;">Error: Ensure database.json is in the same folder.</p>`;
        }
    }

    function renderGrid(dataToRender) {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = Object.keys(dataToRender).map(key => `
            <div class="char-card" onclick="openGuide('${key}')">
                <img src="${dataToRender[key].sprite}">
                <h3>${dataToRender[key].name}</h3>
            </div>
        `).join('');
    }

    function filterChars() {
        const query = document.getElementById('char-search').value.toLowerCase();
        const filtered = {};
        Object.keys(charData).forEach(key => {
            if (charData[key].name.toLowerCase().includes(query)) {
                filtered[key] = charData[key];
            }
        });
        renderGrid(filtered);
    }

    function openGuide(key) {
        if(typeof playSnd === 'function') playSnd();
        const char = charData[key];
        document.getElementById('mosaic-view').style.display = 'none';
        document.getElementById('guide-view').style.display = 'block';
        document.getElementById('guide-sprite').src = char.sprite;
        document.getElementById('guide-name').innerText = char.name;
        document.getElementById('master-bg').style.backgroundImage = `url('${char.bg}')`;

        const menu = document.getElementById('quest-menu-list');
        menu.innerHTML = char.quests.map((q, index) => `
            <div class="quest-nav-item" onclick="showSteps('${key}', ${index})">${q.title}</div>
        `).join('');

        document.getElementById('step-display').innerHTML = '<p style="color:gray;">Select a quest to see details.</p>';
        history.pushState({ guideOpen: true }, "");
    }

    function showSteps(charKey, questIndex) {
        if(typeof playSnd === 'function') playSnd();
        const quest = charData[charKey].quests[questIndex];
        const display = document.getElementById('step-display');
        
        display.innerHTML = `
            <h3 style="color:var(--gold); margin-top:0; border-bottom:1px solid var(--box-border); padding-bottom:10px;">${quest.title}</h3>
            <ul style="list-style:none; padding:0; line-height:1.6;">
                ${quest.steps.map(s => `<li style="margin-bottom:12px; color:white;"><span style="color:var(--gold);">▶</span> ${s}</li>`).join('')}
            </ul>
        `;

        document.querySelectorAll('.quest-nav-item').forEach((el, i) => {
            el.classList.toggle('active-quest', i === questIndex);
        });
    }

    function closeGuide() {
        if(typeof playSnd === 'function') playSnd();
        document.getElementById('mosaic-view').style.display = 'block';
        document.getElementById('guide-view').style.display = 'none';
        document.getElementById('master-bg').style.backgroundImage = "url('backgroundImg.gif')";
        if (history.state?.guideOpen) history.back();
    }

    window.onpopstate = () => { if (document.getElementById('guide-view').style.display === 'block') closeGuide(); };
    
    // Combined the initialization here
    window.addEventListener('DOMContentLoaded', () => {
        if(typeof initMusic === 'function') initMusic(); 
        loadData(); 
    });
    </script>
</body>
</html>
