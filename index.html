<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Queen | Game Database</title>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.85);
            --text: #ffffff;
            --accent: #4ade80;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            background-color: #000;
            overflow-x: hidden;
        }

        /* --- Background --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('backgroundImg.gif') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* --- UI Elements --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: sticky; top: 0; z-index: 100;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold);
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
        }

        /* --- Gallery Grid (image_b9b1fd.png Style) --- */
        .gallery-layout { display: grid; grid-template-columns: 200px 1fr; gap: 30px; }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .img-card {
            aspect-ratio: 1/1;
            border: 4px solid #111; /* Dark frame like image_b9b1fd.png */
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            background: #000;
        }

        .img-card:hover { border-color: var(--gold); transform: scale(1.02); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Lightbox / Zoom --- */
        .lightbox {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .lightbox img { max-width: 90%; max-height: 90%; border: 2px solid var(--gold); }

        /* --- Settings --- */
        .settings-bar {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.8); padding: 15px;
            border-radius: 10px; border: 1px solid var(--gold);
        }

        @keyframes squish {
            0% { transform: scale(1); }
            40% { transform: scale(0.8, 1.2); }
            100% { transform: scale(1); }
        }
        .squish { animation: squish 0.25s ease-in-out; }
    </style>
</head>
<body>

    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">SNAKE QUEEN DATABASE</div>
        <div class="nav-tabs">
            <button class="nav-btn" onclick="switchTab('chars', this)">Characters</button>
            <button class="nav-btn active" onclick="switchTab('gallery', this)">Gallery</button>
            <button class="nav-btn" onclick="switchTab('quests', this)">Quests</button>
        </div>
    </header>

    <div class="container">
        <div class="glass-panel">
            <section id="gallery" class="tab-content">
                <div class="gallery-layout">
                    <div class="gallery-sidebar">
                        <h3 style="color:var(--gold)">Characters</h3>
                        <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Emma', this)">Emma</button>
                        <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Evelyn', this)">Evelyn</button>
                        <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Haniya', this)">Haniya</button>
                        <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Kirby', this)">Kirby</button>
                        <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Sofia', this)">Sofia</button>
                        <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Toni', this)">Toni</button>                                 
                    </div>
                    <div class="gallery-grid" id="gallery-items">
                        </div>
                </div>
            </section>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="">
    </div>

    <div class="settings-bar">
        <div style="font-size:12px; margin-bottom:5px;">🔊 SQUISH SOUND</div>
        <input type="checkbox" id="soundOn" checked>
    </div>

    <audio id="bgMusic" loop src="StarmakerMainmenuTheme.mp3"></audio>
    <audio id="squishSnd" src="squish.mp3"></audio>

    <script>
        const githubUser = 'DrMuramasa';
        const repoName = 'StarmakerWeb';
        const music = document.getElementById('bgMusic');
        const squish = document.getElementById('squishSnd');

        window.onclick = () => { if(music.paused) music.play(); };

        function switchTab(id, btn) {
            playSquish(btn);
            // Tab switching logic here
        }

        function playSquish(btn) {
            if(document.getElementById('soundOn').checked) {
                squish.currentTime = 0;
                squish.play();
            }
            btn.classList.add('squish');
            setTimeout(() => btn.classList.remove('squish'), 250);
        }

        async function loadGallery(folder, btn) {
            playSquish(btn);
            const grid = document.getElementById('gallery-items');
            grid.innerHTML = "Opening vault...";

            const url = `https://api.github.com/repos/${githubUser}/${repoName}/contents/images/characters/${folder}`;
            
            try {
                const res = await fetch(url);
                if(!res.ok) throw new Error(`404: Folder '${folder}' not found at ${url}`);
                
                const files = await res.json();
                grid.innerHTML = "";
                
                files.forEach(file => {
                    if(file.name.match(/\.(png|jpg|gif|webp)$/i)) {
                        const div = document.createElement('div');
                        div.className = 'img-card';
                        div.onclick = () => {
                            document.getElementById('lb-img').src = file.download_url;
                            document.getElementById('lightbox').style.display = 'flex';
                        };
                        div.innerHTML = `<img src="${file.download_url}">`;
                        grid.appendChild(div);
                    }
                });
            } catch (err) {
                grid.innerHTML = `<div style="color:#ff7675; padding:20px; border:1px solid #ff7675; border-radius:10px;">
                    <strong>ERROR:</strong> ${err.message}<br><br>
                    Check that your folder is named exactly <b>${folder}</b> inside <b>images/characters/</b>
                </div>`;
            }
        }

        // Auto-load first category
        window.onload = () => loadGallery('snake_queen', document.querySelector('.gallery-sidebar .nav-btn'));
    </script>
</body>
</html>
