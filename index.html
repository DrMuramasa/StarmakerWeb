<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starmaker | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
</head>
<body>
    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>

        <div class="music-controls">
            <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0;">🔊</button>
            <label>VOL</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
        </div>

        <nav>
            <a href="index.html" class="nav-btn active">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div style="display: flex; align-items: center; justify-content: center; height: 80vh;">
            <div class="glass-panel" style="text-align:center; padding: 60px; max-width: 800px;">
                <h1 style="font-size: 5rem; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);">SNAKE QUEEN</h1>
                <p style="letter-spacing: 3px; margin-bottom: 40px; opacity: 0.8;">ACCESSING ENCRYPTED SUBJECT FILES...</p>
                
                <a href="characters.html" class="nav-btn" onclick="playSnd()" style="padding:15px 50px; font-size: 1.2rem; display: inline-block;">ENTER DATABASE</a>
            </div>
        </div>
    </div>

    <script>
        // Start the music logic for this page
        window.addEventListener('DOMContentLoaded', initMusic);
    </script>
</body>
</html>
