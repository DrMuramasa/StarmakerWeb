<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Queen | Home</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Shared Styles included directly for ease of copy-paste */
        :root { --gold: #d4af37; --glass: rgba(0, 0, 0, 0.85); --text: #ffffff; --box-border: rgba(212, 175, 55, 0.3); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); background-color: #000; background-attachment: fixed; }
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('backgroundImg.gif') no-repeat center center; background-size: cover; z-index: -2; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: -1; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); color: white; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; text-decoration: none; display: inline-block; margin-left: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .container { max-width: 1750px; margin: 30px auto; padding: 0 20px; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 30px; min-height: 850px; }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn active">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
            <a href="quests.html" class="nav-btn">Quests</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <section id="home" style="text-align:center; padding: 150px 0;">
                <h1 style="font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.4);">SNAKE QUEEN</h1>
                <p style="max-width: 600px; margin: 0 auto 40px; opacity: 0.8;">Neural Interface Online. Accessing subject archives and visual logs.</p>
                <a href="characters.html" class="nav-btn" style="padding: 15px 60px; font-size: 1.1rem;">INITIALIZE DATABASE</a>
            </section>
        </div>
    </div>
</body>
</html>
