<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Queen | Game Database</title>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.8);
            --text: #ffffff;
            --accent: #4ade80;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            color: var(--text);
            background-color: #000;
            overflow-x: hidden;
        }

        /* --- Background Layers --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('backgroundImg.gif') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* --- Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 3px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .nav-tabs {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.05);
        }

        .nav-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- Squish Animation --- */
        @keyframes squish {
            0% { transform: scale(1); }
            40% { transform: scale(0.85, 1.15); }
            100% { transform: scale(1); }
        }
        .squish-effect { animation: squish 0.25s ease-in-out; }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            min-height: 500px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Gallery System --- */
        .gallery-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 30px;
        }

        .gallery-sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            padding-right: 20px;
        }

        .filter-btn {
            background: none;
            border: none;
            color: #ccc;
            text-align: left;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .img-card {
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
            background: #111;
        }

        .img-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Lightbox / Zoom Feature --- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85%;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: default;
        }

        /* --- Settings Bar --- */
        .settings-bar {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 200;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <header>
        <div class="logo">SNAKE QUEEN</div>
        <div class="nav-tabs">
            <button class="nav-btn" onclick="switchMainTab('characters', this)">Characters</button>
            <button class="nav-btn" onclick="switchMainTab('quests', this)">Quests</button>
            <button class="nav-btn" onclick="switchMainTab('trophies', this)">Trophies</button>
            <button class="nav-btn active" onclick="switchMainTab('gallery', this)">Gallery</button>
        </div>
    </header>

    <div class="container">
        <div class="glass-panel">
            
            <section id="characters" class="tab-content">
                <h1>Characters</h1>
                <p>Detailed lore and stats will appear here.</p>
            </section>

            <section id="gallery" class="tab-content active">
                <div class="gallery-layout">
                    <div class="gallery-sidebar">
                        <h3 style="color:var(--gold)">Categories</h3>
                        <button class="filter-btn active" onclick="loadGallery('snake_queen', this)">Snake Queen</button>
                        <button class="filter-btn" onclick="loadGallery('Charlotte', this)">Charlotte</button>
                        <button class="filter-btn" onclick="loadGallery('general', this)">General Art</button>
                    </div>
                    <div class="gallery-grid" id="gallery-items">
                        </div>
                </div>
            </section>

            <section id="quests" class="tab-content">
                <h1>Quests</h1>
                <p>Track your progress through the realm.</p>
            </section>

            <section id="trophies" class="tab-content">
                <h1>Trophies</h1>
                <p>Unlock achievements to fill your vault.</p>
            </section>

        </div>
    </div>

    <audio id="bgMusic" loop src="StarmakerMainmenuTheme.mp3"></audio>
    <audio id="squishSound" src="squish.mp3"></audio>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" onclick="event.stopPropagation()">
        <div style="position:absolute; top:20px; right:30px; font-size:30px; color:white; cursor:pointer;">&times;</div>
    </div>

    <div class="settings-bar">
        <div class="setting-item">
            <span>🎵 Music</span>
            <input type="range" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume(this.value)">
        </div>
        <div class="setting-item">
            <span>🔊 UI Sounds</span>
            <input type="checkbox" id="soundToggle" checked>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Change these to your actual GitHub info
        const githubUser = 'YOUR_GITHUB_USERNAME';
        const repoName = 'YOUR_REPO_NAME';
        const galleryCache = {};

        // --- AUDIO LOGIC ---
        const music = document.getElementById('bgMusic');
        const squish = document.getElementById('squishSound');
        const soundToggle = document.getElementById('soundToggle');

        // Start music on first interaction
        window.addEventListener('click', () => {
            if (music.paused) music.play();
        }, { once: true });

        function playSquish() {
            if (soundToggle.checked) {
                squish.currentTime = 0;
                squish.play();
            }
        }

        function updateVolume(val) {
            music.volume = val;
        }

        // --- TAB SWITCHING ---
        function switchMainTab(tabId, btn) {
            playSquish();
            btn.classList.add('squish-effect');
            setTimeout(() => btn.classList.remove('squish-effect'), 250);

            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // --- AUTO GALLERY LOGIC ---
        async function loadGallery(folderName, btn) {
            playSquish();
            
            // Update Sidebar UI
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const display = document.getElementById('gallery-items');

            // Use Cache if available
            if (galleryCache[folderName]) {
                renderImages(galleryCache[folderName]);
                return;
            }

            display.innerHTML = '<p>Opening the vault...</p>';

            try {
                const url = `https://api.github.com/repos/${githubUser}/${repoName}/contents/images/characters/${folderName}`;
                const response = await fetch(url);
                const files = await response.json();

                if (Array.isArray(files)) {
                    galleryCache[folderName] = files;
                    renderImages(files);
                } else {
                    display.innerHTML = '<p>No treasures found in this folder.</p>';
                }
            } catch (e) {
                display.innerHTML = '<p>Error connecting to GitHub.</p>';
            }
        }

        function renderImages(files) {
            const display = document.getElementById('gallery-items');
            display.innerHTML = '';
            files.forEach(file => {
                if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    // Link clicking the image to open the lightbox
                    card.onclick = () => openLightbox(file.download_url);
                    card.innerHTML = `<img src="${file.download_url}" alt="Character Art">`;
                    display.appendChild(card);
                }
            });
        }

        // --- LIGHTBOX/ZOOM FUNCTIONS ---
        function openLightbox(imgUrl) {
            document.getElementById('lightbox-img').src = imgUrl;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // Initial Load
        window.onload = () => {
            const firstBtn = document.querySelector('.filter-btn');
            loadGallery('snake_queen', firstBtn);
        };
    </script>
</body>
</html>
