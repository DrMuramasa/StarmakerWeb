<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Queen | Game Database</title>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.85);
            --text: #ffffff;
            --req-color: #ff4466;
            --box-border: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            background-color: #000;
            overflow-x: hidden;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }

        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('backgroundImg.gif') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: sticky; top: 0; z-index: 100;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin-left: 10px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold);
        }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            min-height: 500px;
        }

        /* --- Tab System --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Character Archive Grid --- */
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .char-card { 
            background: rgba(0,0,0,0.6); border: 1px solid var(--box-border); 
            border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s;
        }
        .char-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .char-card img { width: 100%; height: 300px; object-fit: cover; border-bottom: 1px solid var(--box-border); }
        .char-card h3 { padding: 12px; margin: 0; text-align: center; color: var(--gold); letter-spacing: 1px; }

        /* --- Integrated Guide Look (Merging Image 1 & 2) --- */
        #guide-view { display: none; }
        .guide-layout { 
            display: grid; 
            grid-template-columns: 320px 250px 1fr; 
            gap: 20px; 
            align-items: start;
        }

        /* Sidebar & Quest List Styling from Image 1/2 */
        .profile-box, .quest-box, .details-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--box-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .sprite-container {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
            overflow: hidden;
        }
        .sprite-container img { width: 100%; display: block; }

        .q-item {
            padding: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid transparent;
            color: #aaa;
            background: rgba(255,255,255,0.02);
            transition: 0.2s;
            font-weight: 600;
        }
        .q-item:hover { background: rgba(212,175,55,0.05); color: var(--text); }
        .q-item.active { 
            border-color: var(--gold); 
            color: var(--gold); 
            background: rgba(212, 175, 55, 0.1); 
            box-shadow: 0 0 10px rgba(212,175,55,0.1);
        }

        .step { display: flex; gap: 12px; margin-bottom: 20px; line-height: 1.5; }
        .bullet { color: var(--gold); font-size: 1.2em; }
        .req-tag { 
            display: block; 
            color: var(--req-color); 
            font-weight: bold; 
            font-size: 0.85em; 
            text-transform: uppercase; 
            margin-top: 5px;
            padding-left: 10px;
            border-left: 2px solid var(--req-color);
        }

        @keyframes squish { 0% { transform: scale(1); } 40% { transform: scale(0.9, 1.1); } 100% { transform: scale(1); } }
        .squish { animation: squish 0.2s ease-in-out; }
    </style>
</head>
<body>

    <div class="bg-wrapper" id="master-bg"></div>
    <div class="bg-overlay"></div>

    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>
        <nav class="nav-tabs">
            <button class="nav-btn active" onclick="switchTab('home', this)">Home</button>
            <button class="nav-btn" onclick="switchTab('characters', this)">Characters</button>
            <button class="nav-btn" onclick="switchTab('gallery', this)">Gallery</button>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            
            <section id="home" class="tab-content active">
                <div style="text-align:center; padding: 100px 0;">
                    <h1 style="font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.5);">SNAKE QUEEN</h1>
                    <button class="nav-btn" style="padding: 15px 50px; font-size: 1.2rem;" onclick="document.querySelectorAll('.nav-btn')[1].click()">ACCESS DATA</button>
                </div>
            </section>

            <section id="characters" class="tab-content">
                <div id="mosaic-view">
                    <h2 style="color:var(--gold); margin-bottom: 30px; border-bottom: 1px solid var(--box-border); padding-bottom: 10px;">SUBJECT ARCHIVES</h2>
                    <div id="char-grid" class="grid-view"></div>
                </div>

                <div id="guide-view">
                    <button class="nav-btn" style="margin-bottom: 25px;" onclick="closeGuide()">← BACK TO ARCHIVES</button>
                    <div class="guide-layout">
                        <div class="profile-box">
                            <div class="sprite-container" id="display-sprite"></div>
                            <h2 id="display-name" style="color:var(--gold); text-transform: uppercase; margin: 10px 0;"></h2>
                            <p id="display-bio" style="font-size: 0.9em; opacity: 0.7; line-height: 1.4;"></p>
                        </div>
                        <div class="quest-box" id="quest-list"></div>
                        <div class="details-box">
                            <h2 id="q-title" style="color:var(--gold); margin-top:0;"></h2>
                            <p id="q-desc" style="font-style:italic; opacity: 0.6; margin-bottom: 25px;"></p>
                            <div id="q-steps"></div>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <audio id="squishSnd" src="squish.mp3"></audio>

    <script>
        const characterData = {
            "josef": {
                name: "Josef",
                bio: "A key household figure. Interactions with him influence major route branches.",
                sprite: "images/josef_sprite.png",
                bg: "images/josef_bg.jpg",
                quests: [
                    { name: "Beer Strategy", title: "The Friday Beer Strategy", desc: "Unlock his route via Friday interactions.", 
                      steps: [{t: "Meet at entrance on Friday", r: "Anna 3 Hearts Required"}] }
                ]
            },
            "amelia": {
                name: "Amelia",
                bio: "Hardworking farm girl. Known for her routine at the local coffee shop.",
                sprite: "images/amelia_sprite.png",
                bg: "images/amelia_bg.jpg",
                quests: [
                    { name: "Coffee Shop", title: "Daily Grind", desc: "Meet Amelia during her work shift.", 
                      steps: [{t: "Visit shop 3 times", r: ""}] }
                ]
            }
        };

        function switchTab(id, btn) {
            playSnd(btn);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id !== 'characters') closeGuide();
        }

        function playSnd(btn) {
            const snd = document.getElementById('squishSnd');
            snd.currentTime = 0; snd.play();
            if(btn) { btn.classList.add('squish'); setTimeout(() => btn.classList.remove('squish'), 200); }
        }

        function init() {
            const grid = document.getElementById('char-grid');
            for(let key in characterData) {
                const char = characterData[key];
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => openGuide(key);
                card.innerHTML = `<img src="${char.sprite}"><h3>${char.name}</h3>`;
                grid.appendChild(card);
            }
        }

        function openGuide(key) {
            // Update browser history state for Back button support
            history.pushState({view: 'guide'}, ''); 
            
            const char = characterData[key];
            document.getElementById('mosaic-view').style.display = 'none';
            document.getElementById('guide-view').style.display = 'block';
            document.getElementById('master-bg').style.backgroundImage = `url('${char.bg}')`;
            
            document.getElementById('display-sprite').innerHTML = `<img src="${char.sprite}">`;
            document.getElementById('display-name').innerText = char.name;
            document.getElementById('display-bio').innerText = char.bio;

            const qList = document.getElementById('quest-list');
            qList.innerHTML = "";
            char.quests.forEach((q, i) => {
                const item = document.createElement('div');
                item.className = `q-item ${i===0?'active':''}`;
                item.innerText = q.name;
                item.onclick = () => {
                    document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    showQuest(q);
                };
                qList.appendChild(item);
            });
            showQuest(char.quests[0]);
        }

        function showQuest(q) {
            document.getElementById('q-title').innerText = q.title;
            document.getElementById('q-desc').innerText = q.desc;
            document.getElementById('q-steps').innerHTML = q.steps.map(s => `
                <div class="step">
                    <span class="bullet">▶</span>
                    <div>${s.t}${s.r ? `<span class="req-tag">REQ: ${s.r}</span>` : ''}</div>
                </div>`).join('');
        }

        function closeGuide() {
            document.getElementById('mosaic-view').style.display = 'block';
            document.getElementById('guide-view').style.display = 'none';
            document.getElementById('master-bg').style.backgroundImage = "url('backgroundImg.gif')";
        }

        // --- Back Button & Backspace Logic ---
        window.onpopstate = function() {
            // If the user presses the browser back button
            closeGuide();
        };

        window.onkeydown = function(e) {
            // If the user presses the Backspace key (code 8)
            // and the guide view is currently open
            if (e.keyCode === 8 && document.getElementById('guide-view').style.display === 'block') {
                e.preventDefault(); // Prevent browser from actually navigating away
                closeGuide();
            }
        };

        init();
    </script>
</body>
</html>
