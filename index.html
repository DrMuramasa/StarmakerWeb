<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starmaker | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <style>
        /* System Shake Animation */
        @keyframes screenShake {
            0% { transform: translate(0,0); filter: hue-rotate(0deg); }
            10% { transform: translate(-2px, 2px); filter: contrast(1.2); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-4px, 1px); filter: hue-rotate(10deg); }
            40% { transform: translate(4px, -1px); }
            50% { transform: translate(-1px, 2px); }
            60% { transform: translate(1px, -2px); }
            100% { transform: translate(0,0); filter: hue-rotate(0deg); }
        }

        .system-unstable {
            animation: screenShake 0.2s infinite;
        }

        .loader-container {
            display: none; 
            width: 300px;
            margin: 20px auto;
            text-align: left;
        }

        .loader-track {
            width: 100%;
            height: 4px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
            transition: width 2s linear;
        }
        
        #status-text::after {
            content: "|";
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body id="main-body">
    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <header style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;">
    <div style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink: 0;">
        STARMAKER DATABASE
    </div>

    <div></div>

    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="music-controls" style="display: flex; align-items: center; gap: 10px;">
            <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0;">🔊</button>
            <label style="font-size: 0.7rem; color: var(--gold);">VOL</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)" style="width: 80px;">
        </div>

        <div class="settings-container" style="position: relative;">
            <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1.2rem; padding: 5px 10px; border: 1px solid rgba(212, 175, 55, 0.3);">⚙️</button>
            
            <div id="settings-modal" class="glass-panel" style="display:none; position: absolute; top: 50px; right: 0; width: 250px; z-index: 1000; padding: 15px; border: 1px solid var(--gold); background: rgba(10, 10, 15, 0.98);">
                <h4 style="color:var(--gold); margin-top:0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                
                <label style="color:gray; font-size:0.7rem; display:block; margin-bottom:10px;">BACKGROUND TRACK</label>
                <div id="track-list" style="display:flex; flex-direction:column; gap:8px;">
                    <button class="nav-btn" style="font-size:0.8rem; text-align:left;" onclick="changeTrack('audio/home_theme.mp3', 'Home Theme')">01. Starmaker Main</button>
                    <button class="nav-btn" style="font-size:0.8rem; text-align:left;" onclick="changeTrack('audio/secrecy_beat.mp3', 'Investigation')">02. Secrecy Beat</button>
                    <button class="nav-btn" style="font-size:0.8rem; text-align:left;" onclick="changeTrack('audio/night_loop.mp3', 'City Night')">03. Midnight Pulse</button>
                </div>
                
                <p id="current-track-name" style="color:var(--gold); font-size:0.6rem; margin-top:15px; opacity:0.6;">PLAYING: Home Theme</p>
            </div>
        </div>
    </div>
    <header>

    <div class="container">
        <div style="display: flex; align-items: center; justify-content: center; height: 80vh;">
            <div class="glass-panel" style="text-align:center; padding: 60px; max-width: 800px;">
                <h1 class="glitch-title">STARMAKER WORLD</h1>
                <p id="status-text" style="letter-spacing: 3px; margin-bottom: 40px; opacity: 0.8; min-height: 1.2em;">ENCRYPTED SYSTEM TERMINAL</p>
                
                <button id="enter-btn" class="nav-btn" onclick="startBootSequence()" style="padding:15px 50px; font-size: 1.2rem; cursor: pointer; background: none;">ENTER DATABASE</button>

                <div class="loader-container" id="loader">
                    <div id="loader-msg" style="font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; height: 1em;"></div>
                    <div class="loader-track">
                        <div class="loader-fill" id="fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load the music engine and volume settings
        window.addEventListener('DOMContentLoaded', initMusic);

        function typeWriter(text, elementId, speed = 50) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = ""; 
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function startBootSequence() {
            playSnd(); // Interaction unlock

            const body = document.getElementById('main-body');
            const btn = document.getElementById('enter-btn');
            const loader = document.getElementById('loader');
            const fill = document.getElementById('fill');

            btn.style.display = 'none';
            loader.style.display = 'block';

            body.classList.add('system-unstable');

            typeWriter("CRACKING ENCRYPTION...", "status-text", 60);
            typeWriter("BYPASSING FIREWALLS...", "loader-msg", 40);

            setTimeout(() => {
                fill.style.width = "100%";
            }, 100);

            setTimeout(() => {
                body.classList.remove('system-unstable');
                typeWriter("ACCESS GRANTED.", "status-text", 50);
            }, 1800);

            setTimeout(() => {
                window.location.href = "home.html";
            }, 2600); 
        }
    </script>
</body>
</html>
