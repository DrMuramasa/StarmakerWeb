<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Starmaker | Gallery</title>
    <script src="data.js"></script> 
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container Lock: Fixed height for 6 rows */
        .gallery-layout {
            display: grid;
            grid-template-columns: 180px 1fr 380px; 
            gap: 25px;
            height: 935px; 
            align-items: start;
        }

        /* --- STEP 2: Sidebar Flex Container --- */
        .folder-list {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 935px; 
            overflow: hidden; 
        }

        /* --- STEP 3: Scrollable List Area --- */
        #char-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px; 
            scrollbar-width: thin;
            scrollbar-color: var(--gold) rgba(0,0,0,0.2);
        }

        #char-list::-webkit-scrollbar { width: 4px; }
        #char-list::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .gallery-scroll-area {
            height: 100%;
            overflow-y: auto;
            padding: 0 15px;
            border-right: 1px solid var(--box-border);
            border-left: 1px solid var(--box-border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .img-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--box-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .star-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            transition: 0.2s;
            z-index: 10;
        }
        .star-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .sprite-viewer {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--box-border);
            text-align: center;
        }

        .sprite-window {
            height: 650px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .sprite-window img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #lb-img { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); cursor: zoom-out !important; }
        
        /* Sidebar specific styles */
        .char-search-input {
            width: 100%;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--box-border);
            color: var(--gold);
            padding: 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            outline: none;
        }
        .char-search-input:focus { border-color: var(--gold); }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    
    <header>
    <div onclick="goHome()" style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink:0; cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;">
        STARMAKER DATABASE
    </div>

    <button class="hamburger" onclick="toggleMenu()">☰</button>

    <nav id="main-nav">
        <div class="nav-links">
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
            <a href="minigames.html" class="nav-btn">Minigames</a>
        </div>

        <div class="mobile-divider"></div>

        <div class="nav-controls">
            <div class="settings-container">
                <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1rem; padding: 8px 15px;">TRACKS 🎵</button>
                <button class="nav-btn" onclick="toggleCRT()" style="width:100%; margin-top:15px; border-color: #ff4466; color: #ff4466;">📺 TOGGLE CRT MODE</button>
                <div id="settings-modal" class="glass-panel">
                    <h4 style="color:var(--gold); margin:0 0 10px 0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                    <div id="track-list">
                        <button class="track-item nav-btn" onclick="changeTrack('audio/background_theme.mp3', 'Starmaker')">01. Starmaker Main</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/FallApart.mp3', 'Fall Apart')">02. Fall Apart</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/GoBack.mp3', 'Go Back')">03. Go Back</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/Neo.mp3', 'Neo')">04. Neo</button>
                    </div>
                    <p id="current-track-name">STATUS: ONLINE // <span id="track-display">Starmaker</span></p>
                </div>
            </div>

            <div class="music-controls">
                <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0; display:flex; align-items:center;">🔊</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
            </div>
        </div>
    </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div class="gallery-layout">
                
                <div class="folder-list">
                    <h3 style="color:var(--gold); font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 10px;">CHARACTERS</h3>
                    
                    <input type="text" id="char-search" class="char-search-input" placeholder="Search..." oninput="handleSearch(this.value)">

                    <button id="share-filter-btn" class="nav-btn" style="width:100%; margin-bottom:10px; font-size:0.7rem;" onclick="toggleShareFilter()">
                        📂 SHARED: ON
                    </button>

                    <button id="btn-char-fav" class="nav-btn" style="width:100%; margin-bottom:15px; font-size:0.7rem; transition: 0.3s;" onclick="toggleCharFavFilter()">
                        SHOW FAVS: OFF
                    </button>
                    
                    <div id="char-list"></div>
                </div>

                <div class="gallery-scroll-area">
                    <button id="btn-gal-fav" class="nav-btn" style="width:100%; margin-bottom:15px; font-size:0.7rem; transition: 0.3s;" onclick="toggleFavFilter('gallery')">
                        FILTER FAVORITES: OFF
                    </button>
                    <div class="gallery-grid" id="gallery-items"></div>
                </div>

                <div class="sprite-viewer">
                    <h3 style="color:var(--gold); margin-top:0;">SPRITE VIEWER</h3>
                    <div class="sprite-window" id="sprite-display" onclick="playSnd(); openSpriteMax()">
                         <p style="opacity:0.3">Select Archive</p>
                    </div>
                    <div>
                        <button class="nav-btn" onclick="playSnd(); cycleSprite(-1)">◀</button>
                        <button class="nav-btn" onclick="playSnd(); cycleSprite(1)">▶</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightboxSafe()">
        <button id="lb-fav-btn" class="star-btn" style="position:absolute; top:20px; right:20px; font-size:2rem; width:50px; height:50px; z-index:10001; background:rgba(0,0,0,0.8);" onclick="toggleFavFromLightbox(event)">★</button>
        <img id="lb-img" src="">
    </div>

    <script>
        let sprites = [];
        let spriteIdx = 0;
        let galleryImgs = [];
        let galleryIdx = 0;
        let activeView = "gallery"; 
        
        // Filter States
        let charFilterActive = false;
        let galFilterActive = false;
        let shareFilterActive = localStorage.getItem('sm_share_enabled') !== 'false';

        // Shared Favorites Object
        let favorites = JSON.parse(localStorage.getItem('sm_favorites')) || { images: [], chars: [] };

        // --- THE GALLERY DATABASE ENGINE ---
        let charDatabase = {};

        async function initGalleryDB() {
            try {
                const response = await fetch('database.json');
                if (!response.ok) throw new Error("Could not find database.json");
                charDatabase = await response.json();
                renderCharacterList(); 
                syncShareBtnUI();
            } catch (err) {
                console.error("Failed to load database.json for gallery sidebar", err);
                document.getElementById('char-list').innerHTML = "<p style='color:red; font-size:0.8rem;'>Database Offline.</p>";
            }
        }

        // --- STEP 3: SEARCH & SHARE LOGIC ---

        function handleSearch(val) {
            renderCharacterList(); // Re-render sidebar based on search
        }

        function toggleShareFilter() {
            if(typeof playSnd === 'function') playSnd();
            shareFilterActive = !shareFilterActive;
            localStorage.setItem('sm_share_enabled', shareFilterActive);
            syncShareBtnUI();
            applyFilters(); // Re-filter current gallery grid
        }

        function syncShareBtnUI() {
            const btn = document.getElementById('share-filter-btn');
            if (btn) {
                btn.innerText = shareFilterActive ? "📂 SHARED: ON" : "📂 SHARED: OFF";
                btn.style.color = shareFilterActive ? "#00ff00" : "#ff4466";
                btn.style.borderColor = shareFilterActive ? "#00ff00" : "#ff4466";
            }
        }

        // --- CHARACTER SIDEBAR LOGIC ---
        function renderCharacterList() {
            const listContainer = document.getElementById('char-list');
            const searchTerm = document.getElementById('char-search').value.toLowerCase();
            listContainer.innerHTML = "";

            Object.keys(charDatabase).forEach(dbKey => {
                const charData = charDatabase[dbKey];
                if (!charData.gallery) return; 

                const charName = charData.name; 

                // Sidebar Filtering (Search + Favorites)
                if (searchTerm && !charName.toLowerCase().includes(searchTerm)) return;
                
                const isFav = favorites.chars && favorites.chars.includes(charName);
                if (charFilterActive && !isFav) return;

                const btn = document.createElement('button');
                btn.className = `nav-btn char-link ${isFav ? 'is-favorite' : ''}`;
                btn.style.width = "100%";
                btn.style.marginBottom = "10px";
                
                const heartStyle = isFav ? "opacity: 1; filter: grayscale(0);" : "opacity: 0.3; filter: grayscale(1);";
                btn.innerHTML = `
                    <span style="font-size:0.75rem">${charName}</span> 
                    <span class="fav-heart" style="${heartStyle}">❤️</span>
                `;

                // --- Input Handling ---
                let pressTimer;
                let isLongPress = false;

                btn.addEventListener('touchstart', () => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        if (navigator.vibrate) navigator.vibrate(50);
                        toggleCharFav(charName);
                    }, 700);
                }, { passive: true });

                btn.addEventListener('touchend', () => clearTimeout(pressTimer));
                btn.oncontextmenu = (e) => { e.preventDefault(); toggleCharFav(charName); };

                btn.onclick = (e) => { 
                    if (isLongPress) return;
                    if(typeof playSnd === 'function') playSnd(); 
                    if (e.target.classList.contains('fav-heart')) {
                        toggleCharFav(charName);
                        return;
                    }
                    loadGallery(charName); 
                };

                listContainer.appendChild(btn);
            });
        }

        function toggleCharFav(key) {
            if (!favorites.chars) favorites.chars = [];
            if (favorites.chars.includes(key)) {
                favorites.chars = favorites.chars.filter(c => c !== key);
            } else {
                favorites.chars.push(key);
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            renderCharacterList();
            if(typeof playSnd === 'function') playSnd();
        }

        function toggleCharFavFilter() {
            charFilterActive = !charFilterActive;
            const btn = document.getElementById('btn-char-fav');
            btn.innerText = charFilterActive ? "SHOW FAVS: ON" : "SHOW FAVS: OFF";
            btn.style.color = charFilterActive ? "#ff69b4" : "var(--gold)";
            btn.style.borderColor = charFilterActive ? "#ff69b4" : "var(--box-border)";
            renderCharacterList();
            if(typeof playSnd === 'function') playSnd();
        }

        // --- GALLERY CONTENT LOGIC ---
        async function loadGallery(folder) {
            const grid = document.getElementById('gallery-items');
            grid.innerHTML = "Syncing...";
            sprites = []; galleryImgs = []; spriteIdx = 0;

            try {
                const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
                const files = await res.json();
                grid.innerHTML = "";

                files.forEach(file => {
                    const name = file.name.toLowerCase();
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/.test(name);
                    if (isImage) {
                        if (name.includes('_sprite')) {
                            sprites.push(file.download_url);
                        } else if (!name.includes('_bg')) {
                            galleryImgs.push(file.download_url);
                            createCard(file.download_url, grid);
                        }
                    }
                });
                renderSprite();
                applyFilters();
            } catch (err) { 
                grid.innerHTML = "Access Denied."; 
                console.error(err); 
            }
        }

        function createCard(url, container) {
            const isFav = favorites.images.includes(url);
            const card = document.createElement('div');
            card.className = 'img-card';
            card.dataset.url = url;
            
            card.innerHTML = `
                <img src="${url}">
                <button class="star-btn ${isFav ? 'active' : ''}">★</button>
            `;
            
            const btn = card.querySelector('.star-btn');
            let pressTimer;
            let isLongPress = false;

            card.addEventListener('touchstart', () => {
                isLongPress = false;
                pressTimer = setTimeout(() => {
                    isLongPress = true;
                    if (navigator.vibrate) navigator.vibrate(50);
                    toggleFavImg(url, btn);
                }, 700);
            }, { passive: true });

            card.addEventListener('touchend', () => clearTimeout(pressTimer));
            card.oncontextmenu = (e) => { e.preventDefault(); toggleFavImg(url, btn); };

            card.onclick = (e) => {
                if (isLongPress) return;
                if(typeof playSnd === 'function') playSnd();
                if (e.target.classList.contains('star-btn')) {
                    toggleFavImg(url, btn);
                } else {
                    openLightboxByUrl(url);
                }
            };

            container.appendChild(card);
        }

        function toggleFavImg(url, btn) {
            if (favorites.images.includes(url)) {
                favorites.images = favorites.images.filter(i => i !== url);
                btn.classList.remove('active');
            } else {
                favorites.images.push(url);
                btn.classList.add('active');
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            applyFilters();
            if(typeof playSnd === 'function') playSnd();
        }

        function toggleFavFilter(type) {
            if (type === 'gallery') {
                galFilterActive = !galFilterActive;
                const btn = document.getElementById('btn-gal-fav');
                btn.innerText = galFilterActive ? "FILTER FAVORITES: ON" : "FILTER FAVORITES: OFF";
                btn.style.color = galFilterActive ? "var(--gold)" : "white";
                btn.style.borderColor = galFilterActive ? "var(--gold)" : "var(--box-border)";
            }
            applyFilters();
            if(typeof playSnd === 'function') playSnd();
        }

        function applyFilters() {
            document.querySelectorAll('.img-card').forEach(card => {
                const url = card.dataset.url.toLowerCase();
                const isFav = favorites.images.includes(card.dataset.url);
                const isShared = url.includes('share') || url.includes('shared');

                // Logic: Hide if (FavFilter is on and not fav) OR (ShareFilter is off and is shared)
                const shouldHideFav = galFilterActive && !isFav;
                const shouldHideShared = !shareFilterActive && isShared;

                card.style.display = (shouldHideFav || shouldHideShared) ? 'none' : 'block';
            });
        }

        function renderSprite() {
            const disp = document.getElementById('sprite-display');
            disp.innerHTML = sprites.length ? `<img src="${sprites[spriteIdx]}">` : "<p style='opacity:0.3'>Archive Empty</p>";
        }

        function cycleSprite(dir) {
            if (!sprites.length) return;
            const newIdx = spriteIdx + dir;
            if (newIdx < 0 || newIdx >= sprites.length) return;
            spriteIdx = newIdx;
            renderSprite();
            const lb = document.getElementById('lightbox');
            if(lb.style.display === 'flex' && activeView === "sprite") {
                document.getElementById('lb-img').src = sprites[spriteIdx];
            }
        }

        function openLightboxByUrl(url) {
            activeView = "gallery"; 
            galleryIdx = galleryImgs.indexOf(url);
            document.getElementById('lb-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
            const lbFavBtn = document.getElementById('lb-fav-btn');
            lbFavBtn.style.display = 'block';
            if (favorites.images.includes(url)) lbFavBtn.classList.add('active');
            else lbFavBtn.classList.remove('active');
            history.pushState({ lightbox: true }, "");
        }

        function openSpriteMax() {
            if (!sprites.length) return;
            activeView = "sprite"; 
            document.getElementById('lb-img').src = sprites[spriteIdx];
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lb-fav-btn').style.display = 'none';
            history.pushState({ lightbox: true }, "");
        }

        function navigateLightbox(dir) {
            const newIdx = galleryIdx + dir;
            if (newIdx < 0 || newIdx >= galleryImgs.length) return;
            galleryIdx = newIdx;
            const newUrl = galleryImgs[galleryIdx];
            document.getElementById('lb-img').src = newUrl;
            const lbFavBtn = document.getElementById('lb-fav-btn');
            lbFavBtn.classList.toggle('active', favorites.images.includes(newUrl));
        }

        window.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            const isMax = lb.style.display === 'flex';
            if (e.key === "ArrowRight") {
                if (isMax && activeView === "gallery") navigateLightbox(1); 
                else cycleSprite(1);
            } 
            else if (e.key === "ArrowLeft") {
                if (isMax && activeView === "gallery") navigateLightbox(-1); 
                else cycleSprite(-1);
            } 
            else if (e.key === "Escape") { lb.style.display = 'none'; }
        });

        function toggleFavFromLightbox(e) {
            e.stopPropagation(); 
            if(typeof playSnd === 'function') playSnd();
            const url = document.getElementById('lb-img').src;
            if(!url) return;
            const lbBtn = document.getElementById('lb-fav-btn');
            if (favorites.images.includes(url)) {
                favorites.images = favorites.images.filter(i => i !== url);
                lbBtn.classList.remove('active');
            } else {
                favorites.images.push(url);
                lbBtn.classList.add('active');
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            const gridCardStar = document.querySelector(`.img-card[data-url="${url}"] .star-btn`);
            if (gridCardStar) gridCardStar.classList.toggle('active', favorites.images.includes(url));
            applyFilters();
        }
        
        let touchStartX = 0;
        let isSwipingLightbox = false; 
        
        window.addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].screenX; 
            isSwipingLightbox = false; 
        }, { passive: true });
        
        window.addEventListener('touchmove', e => {
            if (Math.abs(touchStartX - e.changedTouches[0].screenX) > 20) isSwipingLightbox = true;
        }, { passive: true });

        window.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (Math.abs(touchStartX - touchEndX) > 70) {
                if (typeof playSnd === 'function') playSnd();
                let dir = touchStartX > touchEndX ? 1 : -1; 
                const lb = document.getElementById('lightbox');
                if (lb.style.display === 'flex' && activeView === "gallery") navigateLightbox(dir); 
                else cycleSprite(dir);
            }
            setTimeout(() => { isSwipingLightbox = false; }, 500);
        }, { passive: true });

        function closeLightboxSafe() {
            if (isSwipingLightbox) return; 
            if(typeof playSnd === 'function') playSnd();
            document.getElementById('lightbox').style.display = 'none';
        }

        window.onpopstate = () => { if (document.getElementById('lightbox').style.display === 'flex') document.getElementById('lightbox').style.display = 'none'; };

        window.addEventListener('DOMContentLoaded', () => {
            if(typeof initMusic === 'function') initMusic();
            initGalleryDB(); 
        });
    </script>
</body>
</html>
