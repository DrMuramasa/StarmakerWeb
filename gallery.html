<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starmaker | Gallery</title>
    <script src="data.js"></script> 
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container Lock: Fixed height for 6 rows */
        .gallery-layout {
            display: grid;
            grid-template-columns: 180px 1fr 380px; 
            gap: 25px;
            height: 935px; 
            align-items: start;
        }

        .gallery-scroll-area {
            height: 100%;
            overflow-y: auto;
            padding: 0 15px;
            border-right: 1px solid var(--box-border);
            border-left: 1px solid var(--box-border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .img-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--box-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .star-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            transition: 0.2s;
            z-index: 10;
        }
        .star-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .fav-toggle {
            margin-bottom: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
            cursor: pointer;
        }

        .sprite-viewer {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--box-border);
            text-align: center;
        }

        .sprite-window {
            height: 650px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .sprite-window img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #lb-img { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    
    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>

        <div class="music-controls">
            <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0;">🔊</button>
            <label>VOL</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
        </div>

        <nav>
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn active">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div class="gallery-layout">
                
                <div class="folder-list">
                    <h3 style="color:var(--gold); font-size: 0.9rem; letter-spacing: 1px;">CHARACTERS</h3>
                    <div class="fav-toggle" onclick="toggleFavFilter('chars')">
                        <input type="checkbox" id="char-fav-only"> Show Favs Only
                    </div>
                    <div id="char-list">
                        <button class="nav-btn char-link" style="width:100%; margin-bottom:10px;" onclick="playSnd(); loadGallery('Amelia')">Amelia</button>
                        <button class="nav-btn char-link" style="width:100%; margin-bottom:10px;" onclick="playSnd(); loadGallery('Emma')">Emma</button>
                        <button class="nav-btn char-link" style="width:100%; margin-bottom:10px;" onclick="playSnd(); loadGallery('Evelyn')">Evelyn</button>
                        <button class="nav-btn char-link" style="width:100%; margin-bottom:10px;" onclick="playSnd(); loadGallery('Toni')">Toni</button>
                        <button class="nav-btn char-link" style="width:100%; margin-bottom:10px;" onclick="playSnd(); loadGallery('Sofia')">Sofia</button>
                    </div>
                </div>

                <div class="gallery-scroll-area">
                    <div class="fav-toggle" onclick="toggleFavFilter('gallery')">
                        <input type="checkbox" id="gal-fav-only"> Filter Favorites
                    </div>
                    <div class="gallery-grid" id="gallery-items"></div>
                </div>

                <div class="sprite-viewer">
                    <h3 style="color:var(--gold); margin-top:0;">SPRITE VIEWER</h3>
                    <div class="sprite-window" id="sprite-display" onclick="playSnd(); openSpriteMax()">
                         <p style="opacity:0.3">Select Archive</p>
                    </div>
                    <div>
                        <button class="nav-btn" onclick="playSnd(); cycleSprite(-1)">◀</button>
                        <button class="nav-btn" onclick="playSnd(); cycleSprite(1)">▶</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        let sprites = [];
        let spriteIdx = 0;
        let galleryImgs = [];
        let galleryIdx = 0;
        let activeView = "gallery"; 

        let favorites = JSON.parse(localStorage.getItem('sm_favorites')) || { images: [], chars: [] };

        async function loadGallery(folder) {
    const grid = document.getElementById('gallery-items');
    grid.innerHTML = "Syncing...";
    sprites = []; galleryImgs = []; spriteIdx = 0;

    try {
        const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
        const files = await res.json();
        grid.innerHTML = "";

        files.forEach(file => {
            const name = file.name.toLowerCase();
            
            // FIX: Only process files that are actually images (jpg, png, gif, webp)
            const isImage = /\.(jpg|jpeg|png|gif|webp)$/.test(name);
            
            if (isImage) {
                if (name.includes('_sprite')) {
                    sprites.push(file.download_url);
                } else if (!name.includes('_bg')) {
                    galleryImgs.push(file.download_url);
                    createCard(file.download_url, grid);
                }
            }
        });
        renderSprite();
        applyFilters();
    } catch (err) { 
        grid.innerHTML = "Access Denied."; 
        console.error(err); 
    }
}

        function createCard(url, container) {
            const isFav = favorites.images.includes(url);
            const card = document.createElement('div');
            card.className = 'img-card';
            card.dataset.url = url;
            card.innerHTML = `
                <img src="${url}" onclick="playSnd(); openLightboxByUrl('${url}')">
                <button class="star-btn ${isFav ? 'active' : ''}" onclick="playSnd(); toggleFavImg('${url}', this); event.stopPropagation();">★</button>
            `;
            container.appendChild(card);
        }

        function toggleFavImg(url, btn) {
            if (favorites.images.includes(url)) {
                favorites.images = favorites.images.filter(i => i !== url);
                btn.classList.remove('active');
            } else {
                favorites.images.push(url);
                btn.classList.add('active');
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            applyFilters();
        }

        function toggleFavFilter(type) {
            if (type === 'chars') document.getElementById('char-fav-only').checked = !document.getElementById('char-fav-only').checked;
            if (type === 'gallery') document.getElementById('gal-fav-only').checked = !document.getElementById('gal-fav-only').checked;
            applyFilters();
        }

        function applyFilters() {
            const imgFavOnly = document.getElementById('gal-fav-only').checked;
            document.querySelectorAll('.img-card').forEach(card => {
                const isFav = favorites.images.includes(card.dataset.url);
                card.style.display = (imgFavOnly && !isFav) ? 'none' : 'block';
            });
        }

        function renderSprite() {
            const disp = document.getElementById('sprite-display');
            disp.innerHTML = sprites.length ? `<img src="${sprites[spriteIdx]}">` : "<p>Offline</p>";
        }

        function cycleSprite(dir) {
            if (!sprites.length) return;
            spriteIdx = (spriteIdx + dir + sprites.length) % sprites.length;
            renderSprite();
            const lb = document.getElementById('lightbox');
            if(lb.style.display === 'flex' && activeView === "sprite") {
                document.getElementById('lb-img').src = sprites[spriteIdx];
            }
        }

        function openLightboxByUrl(url) {
            activeView = "gallery"; 
            galleryIdx = galleryImgs.indexOf(url);
            document.getElementById('lb-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function openSpriteMax() {
            if (!sprites.length) return;
            activeView = "sprite"; 
            document.getElementById('lb-img').src = sprites[spriteIdx];
            document.getElementById('lightbox').style.display = 'flex';
        }

        window.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            const isMax = lb.style.display === 'flex';

            if (e.key === "ArrowRight") {
                if (isMax) {
                    if(activeView === "gallery") {
                        galleryIdx = (galleryIdx + 1) % galleryImgs.length;
                        document.getElementById('lb-img').src = galleryImgs[galleryIdx];
                    } else {
                        cycleSprite(1); 
                    }
                } else {
                    cycleSprite(1);
                }
            } 
            else if (e.key === "ArrowLeft") {
                if (isMax) {
                    if(activeView === "gallery") {
                        galleryIdx = (galleryIdx - 1 + galleryImgs.length) % galleryImgs.length;
                        document.getElementById('lb-img').src = galleryImgs[galleryIdx];
                    } else {
                        cycleSprite(-1); 
                    }
                } else {
                    cycleSprite(-1);
                }
            } 
            else if (e.key === "Escape") {
                lb.style.display = 'none';
            }
        });


        window.addEventListener('DOMContentLoaded', () => {
               initMusic(); // Starts the music and fade effect
               // Optional: loadGallery('Amelia'); // Uncomment this if you want a character loaded by default
        });

        //THIS SEGMENT IS FOR SWIPING ON PHONE
        let touchstartX = 0;
        let touchendX = 0;

function handleGesture() {
    const swipeThreshold = 50; // Minimum distance to be considered a swipe
    if (touchendX < touchstartX - swipeThreshold) {
        // Swiped Left -> Go Next
        playSnd();
        if (document.getElementById('lightbox').style.display === 'flex') {
            activeView === "gallery" ? cycleGallery(1) : cycleSprite(1);
        } else {
            cycleSprite(1);
        }
    }
    if (touchendX > touchstartX + swipeThreshold) {
        // Swiped Right -> Go Back
        playSnd();
        if (document.getElementById('lightbox').style.display === 'flex') {
            activeView === "gallery" ? cycleGallery(-1) : cycleSprite(-1);
        } else {
            cycleSprite(-1);
        }
    }
}

// Attach listeners to the areas where you want swiping to work
const swipeAreas = [document.getElementById('lightbox'), document.getElementById('sprite-display')];

swipeAreas.forEach(area => {
    if(!area) return;
    area.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
    });

    area.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleGesture();
    });
});

// Helper for the Gallery cycling (to match your Sprite cycling)
function cycleGallery(dir) {
    galleryIdx = (galleryIdx + dir + galleryImgs.length) % galleryImgs.length;
    document.getElementById('lb-img').src = galleryImgs[galleryIdx];
}
    </script>
</body>
</html>
