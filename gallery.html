<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Starmaker | Gallery</title>
    <script src="data.js"></script> 
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container Lock: Fixed height for 6 rows */
        .gallery-layout {
            display: grid;
            grid-template-columns: 180px 1fr 380px; 
            gap: 25px;
            height: 935px; 
            align-items: start;
        }

        .gallery-scroll-area {
            height: 100%;
            overflow-y: auto;
            padding: 0 15px;
            border-right: 1px solid var(--box-border);
            border-left: 1px solid var(--box-border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .img-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--box-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .star-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            transition: 0.2s;
            z-index: 10;
        }
        .star-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* FAVORITE CHARACTER STYLE */
        .char-link.is-favorite {
            color: #ff69b4 !important; /* Pink */
            border-color: #ff69b4 !important;
        }
        .char-link.is-favorite::after {
            content: " ❤️";
            font-size: 0.7rem;
            vertical-align: middle;
        }

        .sprite-viewer {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--box-border);
            text-align: center;
        }

        .sprite-window {
            height: 650px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .sprite-window img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #lb-img { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    
    <header>
    <div style="color:var(--gold); font-weight:bold; letter-spacing:2px; flex-shrink:0;">
        STARMAKER DATABASE
    </div>

    <button class="hamburger" onclick="toggleMenu()">☰</button>

    <nav id="main-nav">
        <div class="nav-links">
            <a href="home.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn">Gallery</a>
        </div>

        <div class="mobile-divider"></div>

        <div class="nav-controls">
            <div class="settings-container">
                <button class="nav-btn" onclick="toggleSettings()" style="font-size: 1rem; padding: 8px 15px;">TRACKS ⚙️</button>
                <div id="settings-modal" class="glass-panel">
                    <h4 style="color:var(--gold); margin:0 0 10px 0; border-bottom:1px solid var(--box-border); padding-bottom:5px; font-size: 0.8rem;">SYSTEM SETTINGS</h4>
                    <div id="track-list">
                        <button class="track-item nav-btn" onclick="changeTrack('audio/background_theme.mp3', 'Starmaker')">01. Starmaker Main</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/FallApart.mp3', 'Fall Apart')">02. Fall Apart</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/GoBack.mp3', 'Go Back')">03. Go Back</button>
                        <button class="track-item nav-btn" onclick="changeTrack('audio/Neo.mp3', 'Neo')">04. Neo</button>
                    </div>
                    <p id="current-track-name">STATUS: ONLINE // <span id="track-display">Starmaker</span></p>
                </div>
            </div>

            <div class="music-controls">
                <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.1rem; padding:0; display:flex; align-items:center;">🔊</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" oninput="updateVolume(this.value)">
            </div>
        </div>
    </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div class="gallery-layout">
                
                <div class="folder-list">
                    <h3 style="color:var(--gold); font-size: 0.9rem; letter-spacing: 1px;">CHARACTERS</h3>
                    <button id="btn-char-fav" class="nav-btn" style="width:100%; margin-bottom:15px; font-size:0.7rem; transition: 0.3s;" onclick="toggleCharFavFilter()">
                        SHOW FAVS: OFF
                    </button>
                    <div id="char-list"></div>
                </div>

                <div class="gallery-scroll-area">
                    <button id="btn-gal-fav" class="nav-btn" style="width:100%; margin-bottom:15px; font-size:0.7rem; transition: 0.3s;" onclick="toggleFavFilter('gallery')">
                        FILTER FAVORITES: OFF
                    </button>
                    <div class="gallery-grid" id="gallery-items"></div>
                </div>

                <div class="sprite-viewer">
                    <h3 style="color:var(--gold); margin-top:0;">SPRITE VIEWER</h3>
                    <div class="sprite-window" id="sprite-display" onclick="playSnd(); openSpriteMax()">
                         <p style="opacity:0.3">Select Archive</p>
                    </div>
                    <div>
                        <button class="nav-btn" onclick="playSnd(); cycleSprite(-1)">◀</button>
                        <button class="nav-btn" onclick="playSnd(); cycleSprite(1)">▶</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        let sprites = [];
        let spriteIdx = 0;
        let galleryImgs = [];
        let galleryIdx = 0;
        let activeView = "gallery"; 
        
        // Filter States
        let charFilterActive = false;
        let galFilterActive = false;

        // Shared Favorites Object
        let favorites = JSON.parse(localStorage.getItem('sm_favorites')) || { images: [], chars: [] };

        // --- CHARACTER SIDEBAR LOGIC ---
        function renderCharacterList() {
            const listContainer = document.getElementById('char-list');
            const characterKeys = ["Amelia", "Emma", "Evelyn", "Toni", "Sofia"]; 
            
            listContainer.innerHTML = "";

            characterKeys.forEach(key => {
                const isFav = favorites.chars && favorites.chars.includes(key);
                
                if (charFilterActive && !isFav) return;

                const btn = document.createElement('button');
                btn.className = `nav-btn char-link ${isFav ? 'is-favorite' : ''}`;
                btn.style.width = "100%";
                btn.style.marginBottom = "10px";
                btn.innerText = key;

                btn.onclick = () => { playSnd(); loadGallery(key); };

                // Right Click to Favorite
                btn.oncontextmenu = (e) => {
                    e.preventDefault();
                    toggleCharFav(key);
                };

                listContainer.appendChild(btn);
            });
        }

        function toggleCharFav(key) {
            if (!favorites.chars) favorites.chars = [];
            if (favorites.chars.includes(key)) {
                favorites.chars = favorites.chars.filter(c => c !== key);
            } else {
                favorites.chars.push(key);
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            renderCharacterList();
            if(typeof playSnd === 'function') playSnd();
        }

        function toggleCharFavFilter() {
            charFilterActive = !charFilterActive;
            const btn = document.getElementById('btn-char-fav');
            btn.innerText = charFilterActive ? "SHOW FAVS: ON" : "SHOW FAVS: OFF";
            btn.style.color = charFilterActive ? "#ff69b4" : "var(--gold)";
            btn.style.borderColor = charFilterActive ? "#ff69b4" : "var(--box-border)";
            renderCharacterList();
            if(typeof playSnd === 'function') playSnd();
        }

        // --- GALLERY CONTENT LOGIC ---
        async function loadGallery(folder) {
            const grid = document.getElementById('gallery-items');
            grid.innerHTML = "Syncing...";
            sprites = []; galleryImgs = []; spriteIdx = 0;

            try {
                const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
                const files = await res.json();
                grid.innerHTML = "";

                files.forEach(file => {
                    const name = file.name.toLowerCase();
                    const isImage = /\.(jpg|jpeg|png|gif|webp)$/.test(name);
                    if (isImage) {
                        if (name.includes('_sprite')) {
                            sprites.push(file.download_url);
                        } else if (!name.includes('_bg')) {
                            galleryImgs.push(file.download_url);
                            createCard(file.download_url, grid);
                        }
                    }
                });
                renderSprite();
                applyFilters();
            } catch (err) { 
                grid.innerHTML = "Access Denied."; 
                console.error(err); 
            }
        }

        function createCard(url, container) {
            const isFav = favorites.images.includes(url);
            const card = document.createElement('div');
            card.className = 'img-card';
            card.dataset.url = url;
            card.innerHTML = `
                <img src="${url}" onclick="playSnd(); openLightboxByUrl('${url}')">
                <button class="star-btn ${isFav ? 'active' : ''}" onclick="playSnd(); toggleFavImg('${url}', this); event.stopPropagation();">★</button>
            `;
            
            // Right Click to Favorite Image
            card.oncontextmenu = (e) => {
                e.preventDefault();
                const btn = card.querySelector('.star-btn');
                toggleFavImg(url, btn);
            };

            container.appendChild(card);
        }

        function toggleFavImg(url, btn) {
            if (favorites.images.includes(url)) {
                favorites.images = favorites.images.filter(i => i !== url);
                btn.classList.remove('active');
            } else {
                favorites.images.push(url);
                btn.classList.add('active');
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            applyFilters();
            if(typeof playSnd === 'function') playSnd();
        }

        function toggleFavFilter(type) {
            if (type === 'gallery') {
                galFilterActive = !galFilterActive;
                const btn = document.getElementById('btn-gal-fav');
                btn.innerText = galFilterActive ? "FILTER FAVORITES: ON" : "FILTER FAVORITES: OFF";
                btn.style.color = galFilterActive ? "var(--gold)" : "white";
                btn.style.borderColor = galFilterActive ? "var(--gold)" : "var(--box-border)";
            }
            applyFilters();
            if(typeof playSnd === 'function') playSnd();
        }

        function applyFilters() {
            document.querySelectorAll('.img-card').forEach(card => {
                const isFav = favorites.images.includes(card.dataset.url);
                card.style.display = (galFilterActive && !isFav) ? 'none' : 'block';
            });
        }

        function renderSprite() {
            const disp = document.getElementById('sprite-display');
            disp.innerHTML = sprites.length ? `<img src="${sprites[spriteIdx]}">` : "<p>Offline</p>";
        }

        function cycleSprite(dir) {
            if (!sprites.length) return;
            spriteIdx = (spriteIdx + dir + sprites.length) % sprites.length;
            renderSprite();
            const lb = document.getElementById('lightbox');
            if(lb.style.display === 'flex' && activeView === "sprite") {
                document.getElementById('lb-img').src = sprites[spriteIdx];
            }
        }

        function openLightboxByUrl(url) {
            activeView = "gallery"; 
            galleryIdx = galleryImgs.indexOf(url);
            document.getElementById('lb-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
            history.pushState({ lightbox: true }, "");
        }

        function openSpriteMax() {
            if (!sprites.length) return;
            activeView = "sprite"; 
            document.getElementById('lb-img').src = sprites[spriteIdx];
            document.getElementById('lightbox').style.display = 'flex';
            history.pushState({ lightbox: true }, "");
        }

        // Navigation Keys
        window.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            const isMax = lb.style.display === 'flex';
            if (e.key === "ArrowRight") {
                if (isMax && activeView === "gallery") {
                    galleryIdx = (galleryIdx + 1) % galleryImgs.length;
                    document.getElementById('lb-img').src = galleryImgs[galleryIdx];
                } else { cycleSprite(1); }
            } 
            else if (e.key === "ArrowLeft") {
                if (isMax && activeView === "gallery") {
                    galleryIdx = (galleryIdx - 1 + galleryImgs.length) % galleryImgs.length;
                    document.getElementById('lb-img').src = galleryImgs[galleryIdx];
                } else { cycleSprite(-1); }
            } 
            else if (e.key === "Escape") { lb.style.display = 'none'; }
        });

        // Touch Swipe
        let touchStartX = 0;
        window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
        window.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (Math.abs(touchStartX - touchEndX) > 70) {
                playSnd();
                cycleSprite(touchStartX > touchEndX ? 1 : -1);
            }
        }, false);

        window.onpopstate = () => { if (document.getElementById('lightbox').style.display === 'flex') document.getElementById('lightbox').style.display = 'none'; };

        window.addEventListener('DOMContentLoaded', () => {
            if(typeof initMusic === 'function') initMusic();
            renderCharacterList();
        });
    </script>
</body>
</html>
