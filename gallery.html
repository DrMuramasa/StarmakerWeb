<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | Starmaker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    <header>
        <div style="color:var(--gold); font-weight:bold;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn active">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div style="display:grid; grid-template-columns: 180px 1fr 320px; gap:25px; height: 80vh;">
                <div id="folders">
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Amelia')">Amelia</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Emma')">Emma</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Evelyn')">Evelyn</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Toni')">Toni</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Sofia')">Sofia</button>
                </div>

                <div id="gallery-grid" class="gallery-grid" style="overflow-y:auto;">
                    <p style="text-align:center; color:var(--gold); margin-top:50px;">Select a subject to view archives.</p>
                </div>

                <div class="sprite-viewer">
                    <h3>Sprite Sync</h3>
                    <div id="sprite-window" class="sprite-window" onclick="maxSprite()"></div>
                    <div style="margin-top:15px;">
                        <button class="nav-btn" onclick="cycleSprite(-1)">◀</button>
                        <button class="nav-btn" onclick="cycleSprite(1)">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        let sprites = [];
let spriteIdx = 0;
let galleryImgs = [];
let galleryIdx = 0;

async function loadGallery(folder) {
    const grid = document.getElementById('gallery-items');
    grid.innerHTML = "<p style='color:var(--gold)'>Accessing...</p>";
    sprites = []; galleryImgs = []; spriteIdx = 0;

    const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
    const files = await res.json();
    
    grid.innerHTML = "";
    files.forEach(file => {
        const name = file.name.toLowerCase();
        if(name.includes('_sprite')) {
            sprites.push(file.download_url);
        } else if(!name.includes('_bg')) {
            const currentIdx = galleryImgs.length;
            galleryImgs.push(file.download_url);
            
            const card = document.createElement('div');
            card.className = 'img-card';
            card.onclick = () => openMaximized(currentIdx);
            card.innerHTML = `<img src="${file.download_url}">`;
            grid.appendChild(card);
        }
    });
    renderSprite();
}

function renderSprite() {
    const win = document.getElementById('sprite-display');
    win.innerHTML = sprites.length ? `<img src="${sprites[spriteIdx]}">` : "No Sprites";
}

function cycleSprite(dir) {
    if(!sprites.length) return;
    spriteIdx = (spriteIdx + dir + sprites.length) % sprites.length;
    renderSprite();
}

function openMaximized(idx) {
    galleryIdx = idx;
    const lbImg = document.getElementById('lb-img');
    lbImg.src = galleryImgs[galleryIdx];
    document.getElementById('lightbox').style.display = 'flex';
}

// KEYBOARD NAVIGATION
window.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    const isMax = lb.style.display === 'flex';

    if (e.key === "ArrowRight") {
        if (isMax) {
            galleryIdx = (galleryIdx + 1) % galleryImgs.length;
            document.getElementById('lb-img').src = galleryImgs[galleryIdx];
        } else {
            cycleSprite(1);
        }
    } else if (e.key === "ArrowLeft") {
        if (isMax) {
            galleryIdx = (galleryIdx - 1 + galleryImgs.length) % galleryImgs.length;
            document.getElementById('lb-img').src = galleryImgs[galleryIdx];
        } else {
            cycleSprite(-1);
        }
    } else if (e.key === "Escape") {
        lb.style.display = 'none';
    }
});
    </script>
</body>
</html>
