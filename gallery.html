<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Queen | Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    <header>
        <div style="color:var(--gold); font-weight:bold;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn active">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div class="gallery-layout">
                <div class="folder-list">
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Amelia')">Amelia</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Josef')">Josef</button>
                </div>
                <div class="gallery-scroll-area">
                    <div class="gallery-grid" id="gallery-items"></div>
                </div>
                <div class="sprite-viewer">
                    <h3>Sprite Sync</h3>
                    <div class="sprite-window" id="sprite-display" onclick="openLightbox()"></div>
                    <div style="margin-top:20px;">
                        <button class="nav-btn" onclick="cycleSprite(-1)">◀</button>
                        <button class="nav-btn" onclick="cycleSprite(1)">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img id="lb-img"></div>

    <script src="data.js"></script>
    <script>
        let sprites = [];
        let currentIdx = 0;

        async function loadGallery(folder) {
            const grid = document.getElementById('gallery-items');
            grid.innerHTML = "Fetching...";
            sprites = [];
            
            const url = `https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`;
            const res = await fetch(url);
            const files = await res.json();
            
            grid.innerHTML = "";
            files.forEach(file => {
                if(file.name.includes('_sprite')) {
                    sprites.push(file.download_url);
                } else if(!file.name.includes('_bg')) {
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    card.onclick = () => { document.getElementById('lb-img').src = file.download_url; document.getElementById('lightbox').style.display = 'flex'; };
                    card.innerHTML = `<img src="${file.download_url}">`;
                    grid.appendChild(card);
                }
            });
            renderSprite();
        }

        function renderSprite() {
            const disp = document.getElementById('sprite-display');
            disp.innerHTML = sprites.length ? `<img src="${sprites[currentIdx]}">` : "No Sprites";
        }

        function cycleSprite(dir) {
            if(!sprites.length) return;
            currentIdx = (currentIdx + dir + sprites.length) % sprites.length;
            renderSprite();
        }

        function openLightbox() {
            if(!sprites.length) return;
            document.getElementById('lb-img').src = sprites[currentIdx];
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
