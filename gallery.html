<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Queen | Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    <header>
        <div style="color:var(--gold); font-weight:bold;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn active">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div style="display:grid; grid-template-columns: 200px 1fr 300px; gap:20px;">
                <div id="folders">
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Amelia')">Amelia</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Emma')">Emma</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Evelyn')">Evelyn</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Toni')">Toni</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Sofia')">Sofia</button>
                </div>
                <div id="gallery-grid" class="grid-view" style="max-height:70vh; overflow-y:auto;"></div>
                <div style="text-align:center; background:rgba(0,0,0,0.4); padding:10px; border-radius:10px;">
                    <h3>Sprite Viewer</h3>
                    <div id="sprite-window" style="height:400px; display:flex; align-items:center; justify-content:center;"></div>
                    <button class="nav-btn" onclick="cycle(-1)">◀</button>
                    <button class="nav-btn" onclick="cycle(1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sprites = [];
        let idx = 0;

        async function loadGallery(folder) {
            const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
            const files = await res.json();
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = "";
            sprites = [];

            files.forEach(file => {
                if(file.name.includes('_sprite')) {
                    sprites.push(file.download_url);
                } else if(!file.name.includes('_bg')) {
                    grid.innerHTML += `<div class="char-card"><img src="${file.download_url}"></div>`;
                }
            });
            showSprite();
        }

        function showSprite() {
            const win = document.getElementById('sprite-window');
            win.innerHTML = sprites.length ? `<img src="${sprites[idx]}" style="max-height:100%;">` : "Empty";
        }

        function cycle(dir) {
            idx = (idx + dir + sprites.length) % sprites.length;
            showSprite();
        }
    </script>
</body>
</html>
