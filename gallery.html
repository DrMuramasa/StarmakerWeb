<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starmaker | Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container Lock: Exactly 6 rows high */
        .gallery-layout {
            display: grid;
            grid-template-columns: 180px 1fr 320px;
            gap: 25px;
            /* (140px image * 6) + (15px gap * 5) + padding */
            height: 935px; 
            align-items: start;
        }

        .gallery-scroll-area {
            height: 100%;
            overflow-y: auto;
            padding-right: 15px;
            border-right: 1px solid var(--box-border);
            border-left: 1px solid var(--box-border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .img-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--box-border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* Star Indicator */
        .star-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            transition: 0.2s;
        }
        .star-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .fav-toggle {
            margin-bottom: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
            cursor: pointer;
        }

        .sprite-viewer {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--box-border);
            text-align: center;
        }

        .sprite-window {
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .sprite-window img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #lb-img { max-width: 90%; max-height: 90%; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    
    <header>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:2px;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn active">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div class="gallery-layout">
                
                <div class="folder-list">
                    <h3 style="color:var(--gold); font-size: 0.9rem;">CHARACTERS</h3>
                    <div class="fav-toggle" onclick="toggleFavFilter('chars')">
                        <input type="checkbox" id="char-fav-only"> Show Favs Only
                    </div>
                    <div id="char-list">
                        <button class="nav-btn char-link" data-name="Amelia" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Amelia')">Amelia</button>
                        <button class="nav-btn char-link" data-name="Amelia" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Emma')">Emma</button>
                        <button class="nav-btn char-link" data-name="Amelia" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Evelyn')">Evelyn</button>
                        <button class="nav-btn char-link" data-name="Amelia" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Toni')">Toni</button>
                        <button class="nav-btn char-link" data-name="Amelia" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Sofia')">Sofia</button>
                    </div>
                </div>

                <div class="gallery-scroll-area">
                    <div class="fav-toggle" onclick="toggleFavFilter('gallery')">
                        <input type="checkbox" id="gal-fav-only"> Filter Favorites
                    </div>
                    <div class="gallery-grid" id="gallery-items"></div>
                </div>

                <div class="sprite-viewer">
                    <h3 style="color:var(--gold);">SPRITE VIEWER</h3>
                    <div class="sprite-window" id="sprite-display" onclick="openSpriteMax()"></div>
                    <div>
                        <button class="nav-btn" onclick="cycleSprite(-1)">◀</button>
                        <button class="nav-btn" onclick="cycleSprite(1)">▶</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        let sprites = [];
        let spriteIdx = 0;
        let galleryImgs = [];
        let galleryIdx = 0;
        let currentFolder = "";

        // Load Favorites from LocalStorage
        let favorites = JSON.parse(localStorage.getItem('sm_favorites')) || { images: [], chars: [] };

        async function loadGallery(folder) {
            currentFolder = folder;
            const grid = document.getElementById('gallery-items');
            grid.innerHTML = "Loading...";
            sprites = []; galleryImgs = []; spriteIdx = 0;

            try {
                const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
                const files = await res.json();
                grid.innerHTML = "";

                files.forEach(file => {
                    const name = file.name.toLowerCase();
                    if (name.includes('_sprite')) {
                        sprites.push(file.download_url);
                    } else if (!name.includes('_bg')) {
                        galleryImgs.push(file.download_url);
                        createCard(file.download_url, grid);
                    }
                });
                renderSprite();
                applyFilters();
            } catch (err) { grid.innerHTML = "Error loading files."; }
        }

        function createCard(url, container) {
            const isFav = favorites.images.includes(url);
            const card = document.createElement('div');
            card.className = 'img-card';
            card.dataset.url = url;
            card.innerHTML = `
                <img src="${url}" onclick="openLightboxByUrl('${url}')">
                <button class="star-btn ${isFav ? 'active' : ''}" onclick="toggleFavImg('${url}', this)">★</button>
            `;
            container.appendChild(card);
        }

        function toggleFavImg(url, btn) {
            if (favorites.images.includes(url)) {
                favorites.images = favorites.images.filter(i => i !== url);
                btn.classList.remove('active');
            } else {
                favorites.images.push(url);
                btn.classList.add('active');
            }
            localStorage.setItem('sm_favorites', JSON.stringify(favorites));
            applyFilters();
        }

        function toggleFavFilter(type) {
            if (type === 'chars') document.getElementById('char-fav-only').checked = !document.getElementById('char-fav-only').checked;
            if (type === 'gallery') document.getElementById('gal-fav-only').checked = !document.getElementById('gal-fav-only').checked;
            applyFilters();
        }

        function applyFilters() {
            const imgFavOnly = document.getElementById('gal-fav-only').checked;
            const charFavOnly = document.getElementById('char-fav-only').checked;

            // Filter Gallery
            document.querySelectorAll('.img-card').forEach(card => {
                const isFav = favorites.images.includes(card.dataset.url);
                card.style.display = (imgFavOnly && !isFav) ? 'none' : 'block';
            });

            // Filter Character Buttons (Simulated by name for now)
            document.querySelectorAll('.char-link').forEach(btn => {
                // You can add logic here to mark characters as favorites too
                btn.style.display = 'block'; 
            });
        }

        function renderSprite() {
            const disp = document.getElementById('sprite-display');
            disp.innerHTML = sprites.length ? `<img src="${sprites[spriteIdx]}">` : "<p>Select Character</p>";
        }

        function cycleSprite(dir) {
            if (!sprites.length) return;
            spriteIdx = (spriteIdx + dir + sprites.length) % sprites.length;
            renderSprite();
        }

        function openLightboxByUrl(url) {
            galleryIdx = galleryImgs.indexOf(url);
            document.getElementById('lb-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function openSpriteMax() {
            if (!sprites.length) return;
            document.getElementById('lb-img').src = sprites[spriteIdx];
            document.getElementById('lightbox').style.display = 'flex';
        }

        window.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (lb.style.display === 'flex') {
                if (e.key === "ArrowRight") { galleryIdx = (galleryIdx + 1) % galleryImgs.length; document.getElementById('lb-img').src = galleryImgs[galleryIdx]; }
                if (e.key === "ArrowLeft") { galleryIdx = (galleryIdx - 1 + galleryImgs.length) % galleryImgs.length; document.getElementById('lb-img').src = galleryImgs[galleryIdx]; }
                if (e.key === "Escape") lb.style.display = 'none';
            } else {
                if (e.key === "ArrowRight") cycleSprite(1);
                if (e.key === "ArrowLeft") cycleSprite(-1);
            }
        });
    </script>
</body>
</html>
