<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Queen | Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper"></div><div class="bg-overlay"></div>
    <header>
        <div style="color:var(--gold); font-weight:bold;">STARMAKER DATABASE</div>
        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Characters</a>
            <a href="gallery.html" class="nav-btn active">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <div class="glass-panel">
            <div style="display:grid; grid-template-columns: 200px 1fr 300px; gap:20px;">
                <div id="folders">
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Amelia')">Amelia</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Emma')">Emma</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Evelyn')">Evelyn</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Toni')">Toni</button>
                    <button class="nav-btn" style="width:100%; margin-bottom:10px;" onclick="loadGallery('Sofia')">Sofia</button>
                </div>
                <div id="gallery-grid" class="grid-view" style="max-height:70vh; overflow-y:auto;"></div>
                <div style="text-align:center; background:rgba(0,0,0,0.4); padding:10px; border-radius:10px;">
                    <h3>Sprite Viewer</h3>
                    <div id="sprite-window" style="height:400px; display:flex; align-items:center; justify-content:center;"></div>
                    <button class="nav-btn" onclick="cycle(-1)">◀</button>
                    <button class="nav-btn" onclick="cycle(1)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sprites = [];
let spriteIdx = 0;

let galleryImages = []; // New array to track gallery images for the lightbox
let galleryIdx = 0;

async function loadGallery(folder) {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = "<p style='color:var(--gold)'>Accessing neural link...</p>";
    
    // Reset arrays
    sprites = [];
    galleryImages = [];
    spriteIdx = 0;

    try {
        const res = await fetch(`https://api.github.com/repos/DrMuramasa/StarmakerWeb/contents/images/characters/${folder}`);
        const files = await res.json();
        
        grid.innerHTML = "";
        
        files.forEach(file => {
            const fname = file.name.toLowerCase();
            
            // 1. Handle Sprites
            if(fname.includes('_sprite')) {
                sprites.push(file.download_url);
            } 
            // 2. Handle Gallery Images (exclude backgrounds and sprites)
            else if(!fname.includes('_bg')) {
                const currentImgIdx = galleryImages.length;
                galleryImages.push(file.download_url);
                
                const card = document.createElement('div');
                card.className = 'img-card';
                card.onclick = () => openLightbox(currentImgIdx);
                card.innerHTML = `<img src="${file.download_url}">`;
                grid.appendChild(card);
            }
        });
        
        showSprite();
    } catch (e) {
        grid.innerHTML = "<p>Connection error. System offline.</p>";
    }
}

// --- LIGHTBOX LOGIC ---
function openLightbox(index) {
    galleryIdx = index;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    
    lbImg.src = galleryImages[galleryIdx];
    lb.style.display = 'flex';
}

function navigateGallery(dir) {
    if(!galleryImages.length) return;
    galleryIdx = (galleryIdx + dir + galleryImages.length) % galleryImages.length;
    document.getElementById('lb-img').src = galleryImages[galleryIdx];
}

// --- SPRITE LOGIC ---
function showSprite() {
    const win = document.getElementById('sprite-window');
    win.innerHTML = sprites.length ? `<img src="${sprites[spriteIdx]}" style="max-height:100%;">` : "No Sprites Found";
}

function cycleSprite(dir) {
    if(!sprites.length) return;
    spriteIdx = (spriteIdx + dir + sprites.length) % sprites.length;
    showSprite();
}

// --- KEYBOARD CONTROLS ---
window.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    
    // If the Lightbox is OPEN, arrow keys control the Gallery
    if (lb.style.display === 'flex') {
        if (e.key === "ArrowRight") navigateGallery(1);
        if (e.key === "ArrowLeft") navigateGallery(-1);
        if (e.key === "Escape") lb.style.display = 'none';
    } 
    // If Lightbox is CLOSED, arrow keys control the Sprite Viewer
    else {
        if (e.key === "ArrowRight") cycleSprite(1);
        if (e.key === "ArrowLeft") cycleSprite(-1);
    }
});
    </script>
</body>
</html>
